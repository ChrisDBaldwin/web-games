// ============================================================
// WORLD (flattened, derived from LAYERS)
// ============================================================
const WORLD = {
  rails: [],        // {x1, y1, x2, y2, layerIdx, slope, invLen}
  portals: [],      // {x, y, srcLayer, tgtLayer, tgtX, tgtY}
  finish: null,     // {x, y}
  spikeY: 0,
  bottomY: 0,
  worldW: 0,
};

function layerTopY(idx) { return (CFG.LAYER_COUNT - 1 - idx) * CFG.LAYER_H; }

function buildWorld() {
  WORLD.rails.length = 0;
  WORLD.portals.length = 0;
  WORLD.worldW = CFG.LAYER_WIDTH;

  for (let i = 0; i < LAYERS.length; i++) {
    const L = LAYERS[i];
    const topY = layerTopY(i);
    for (const r of L.rails) {
      const x1 = r[0], x2 = r[1];
      const y1 = topY + r[2], y2 = topY + r[3];
      const dx = x2 - x1;
      WORLD.rails.push({
        x1, y1, x2, y2,
        layerIdx: i,
        slope: (y2 - y1) / dx,
        invLen: 1 / dx,
      });
    }
    if (L.portal) {
      const srcX = L.portal[0];
      const srcY = topY + L.portal[1];
      const tgt = LAYERS[i + 1];
      // Land on the START of the next layer's first rail
      const firstRail = tgt.rails[0];
      const tgtTopY = layerTopY(i + 1);
      const tgtX = Math.min(firstRail[0] + 60, firstRail[1] - 40);
      const tRel = (tgtX - firstRail[0]) / (firstRail[1] - firstRail[0]);
      const tgtY = tgtTopY + firstRail[2] + (firstRail[3] - firstRail[2]) * tRel;
      WORLD.portals.push({
        x: srcX, y: srcY,
        srcLayer: i, tgtLayer: i + 1,
        tgtX, tgtY,
      });
    }
    if (L.finish) {
      WORLD.finish = { x: L.finish[0], y: topY + L.finish[1] };
    }
  }
  WORLD.bottomY = CFG.LAYER_COUNT * CFG.LAYER_H;
  WORLD.spikeY = WORLD.bottomY;
}

// Editor override: if the level editor saved a layer set, swap it in before buildWorld().

    if (Array.isArray(parsed) && parsed.length === 9 && parsed.every(l => l && Array.isArray(l.rails))) {
      LAYERS.length = 0;
      for (const l of parsed) LAYERS.push(l);
      editorOverrideActive = true;
    }
  }
} catch (e) {}
buildWorld();

function railYAt(rail, x) {
  const t = (x - rail.x1) * rail.invLen;
  return rail.y1 + (rail.y2 - rail.y1) * t;
}

function currentLayerIdx(worldY) {
  const i = CFG.LAYER_COUNT - 1 - Math.floor(worldY / CFG.LAYER_H);
  return Math.max(0, Math.min(CFG.LAYER_COUNT - 1, i));
}

// ============================================================
// LEADERBOARD — completed runs only (escape-time ladder)
// ============================================================
const LEADERBOARD_API = 'https://voidtalker.com/games/api';
let onlineScores = null;

function getLocalScores() {
  try { return JSON.parse(localStorage.getItem('railgrindScores') || '[]'); }
  catch { return []; }
}
function rankScores(a, b) {
  const aEsc = a.escaped ? 1 : 0, bEsc = b.escaped ? 1 : 0;
  if (aEsc !== bEsc) return bEsc - aEsc;       // escapes above deaths
  if (aEsc) return a.time - b.time;             // both escaped: fastest wins
  const aL = a.layer | 0, bL = b.layer | 0;
  if (aL !== bL) return bL - aL;                // both died: deepest wins
  return b.time - a.time;                       // tied depth: longer survival wins
}
function saveLocalScore(ini, time, layer, escaped) {
  const scores = getLocalScores();
  scores.push({ ini, time, layer: layer | 0, escaped: escaped ? 1 : 0, date: Date.now() });
  scores.sort(rankScores);
  if (scores.length > 50) scores.length = 50;
  try { localStorage.setItem('railgrindScores', JSON.stringify(scores)); } catch {}
}
function getScores() {
  const online = (onlineScores || []).filter(s => s && s.time != null);
  const list = online.length ? online.slice() : getLocalScores();
  list.sort(rankScores);
  return list;
}
async function fetchScores() {
  if (!LEADERBOARD_API) { onlineScores = null; return; }
  try {
    const res = await fetch(LEADERBOARD_API + '/scores?game=railgrind');
    if (res.ok) onlineScores = await res.json();
  } catch { onlineScores = null; }
}
async function saveScore(ini, time, layer, escaped) {
  saveLocalScore(ini, time, layer, escaped);
  if (!LEADERBOARD_API) return;
  try {
    const res = await fetch(LEADERBOARD_API + '/scores?game=railgrind', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ini, time, layer: layer | 0, escaped: escaped ? 1 : 0 }),
    });
    if (res.ok) onlineScores = await res.json();
  } catch { /* localStorage fallback already saved */ }
}

let CANVAS_W = 960;     // dynamic — width of the logical canvas (game + sidebars)
let GAME_X = 120;       // x offset of the game viewport within the canvas
let sidebarMode = true; // false on narrow screens (mobile portrait)

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  const vw = window.innerWidth, vh = window.innerHeight;
  // Only show sidebars when the viewport is meaningfully wider than 4:3 AND not too narrow.
  // On mobile portrait / narrow screens, drop the sidebars to maximize play area.
  const ar = vw / vh;
  const isNarrow = ar < 1.45 || vw < 600;
  sidebarMode = !isNarrow;
  CANVAS_W = sidebarMode ? CFG.CANVAS_W_WIDE : CFG.W;
  GAME_X = sidebarMode ? CFG.SIDEBAR_W : 0;
  viewScale = Math.min(vw / CANVAS_W, vh / CFG.H);
  canvas.width = vw * dpr;
  canvas.height = vh * dpr;
  canvas.style.width = vw + 'px';
  canvas.style.height = vh + 'px';
  offsetX = (vw - CANVAS_W * viewScale) / 2;
  offsetY = (vh - CFG.H * viewScale) / 2;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
resize();

let jumpPressed = false;
let jumpHeld = false;
function pressJump() {
  jumpPressed = true;
  jumpHeld = true;
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function releaseJump() {
  jumpHeld = false;
}
window.addEventListener('keydown', e => {
  // Initials entry intercepts most keys so typing doesn't pump the jump.
  if (S.state === 'initials') {
    if (e.code === 'Backspace') {
      e.preventDefault();
      if (S.initials.length > 0) S.initials = S.initials.slice(0, -1);
      return;
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      if (!e.repeat) submitInitials();
      return;
    }
    if (e.code === 'Escape') {
      e.preventDefault();
      skipInitials();
      return;
    }
    if (e.key && e.key.length === 1 && /[a-zA-Z]/.test(e.key) && S.initials.length < 3) {
      e.preventDefault();
      S.initials += e.key.toUpperCase();
      return;
    }
    return;
  }
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (!e.repeat) pressJump();
  } else if (e.code === 'KeyM') {
    e.preventDefault();
    S.muted = !S.muted;
  } else if (e.code === 'KeyR') {
    if (S.state === 'over' || S.state === 'won') {
      jumpPressed = true;
    }
  }
}, { passive: false });
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    releaseJump();
  }
}, { passive: false });
canvas.addEventListener('mousedown', e => { e.preventDefault(); pressJump(); });
window.addEventListener('mouseup', e => { releaseJump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); pressJump(); }, { passive: false });
window.addEventListener('touchend', e => { releaseJump(); }, { passive: false });
window.addEventListener('touchcancel', e => { releaseJump(); });
window.addEventListener('blur', () => { releaseJump(); });
window.addEventListener('contextmenu', e => e.preventDefault());

let audioCtx = null;
function beep(freq, dur, type = 'square', vol = 0.06, slideTo = null) {
  if (S.muted) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo != null) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + dur);
  } catch (e) {}
}

  setTimeout(() => beep(70, 0.5, 'sawtooth', 0.06, 35), 320);
}

// ============================================================
// NEON TEXT
// ============================================================
const NEON_WORDS_BY_LAYER = [
  ['PIT', 'SPIKES', '↓↓↓', 'NO EXIT', 'ICE'],
  ['LIARS', 'FRAUD', 'SHAFT', 'DEEP'],
  ['BLOOD', 'RAGE', '666', 'RUIN'],
  ['VOID', 'SIN', 'HERESY', '7TH'],
  ['WRATH', 'FURY', 'BURN', '↑'],
  ['GOLD', 'GREED', 'DEBT'],
  ['FEAST', 'GORGE', 'HUNGRY'],
  ['LUST', 'SWIRL', 'WIND'],
  ['LIMBO', 'SKY', 'EXIT', 'HOME'],
];
const NEON_COLORS = ['#5CFFEA', '#FFAE3A', '#FF4F7A', '#B080FF'];

function prng(n) {
  const x = Math.sin(n * 9301.23 + 49297.13) * 233280;
  return x - Math.floor(x);
}

const neonCache = new Map();
function getNeonSprite(text, size, color) {
  const key = text + '|' + size + '|' + color;
  const cached = neonCache.get(key);
  if (cached) return cached;
  const pad = Math.ceil(size * 1.2);
  const off = document.createElement('canvas');
  const c = off.getContext('2d');
  c.font = `900 ${size}px Impact, "Arial Black", system-ui, sans-serif`;
  const m = c.measureText(text);
  const w = Math.max(2, Math.ceil(m.width) + pad * 2);
  const h = Math.ceil(size * 1.6) + pad * 2;
  off.width = w; off.height = h;
  c.font = `900 ${size}px Impact, "Arial Black", system-ui, sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  const cx = w * 0.5, cy = h * 0.5;
  c.shadowColor = color;
  c.shadowBlur = size * 1.1;
  c.fillStyle = color;
  c.fillText(text, cx, cy);
  c.shadowBlur = size * 0.6;
  c.fillText(text, cx, cy);
  c.shadowBlur = size * 0.3;
  c.fillText(text, cx, cy);
  c.shadowBlur = 0;
  c.fillStyle = '#FFFFFF';
  c.fillText(text, cx, cy);
  const sprite = { canvas: off, w, h };
  neonCache.set(key, sprite);
  return sprite;
}

function drawNeonText(text, x, y, size, color, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.font = `900 ${size}px Impact, "Arial Black", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = size * 0.7;
  ctx.fillStyle = color;
  ctx.fillText(text, 0, 0);
  ctx.shadowBlur = size * 0.35;
  ctx.fillText(text, 0, 0);
  ctx.shadowBlur = size * 0.15;
  ctx.fillText(text, 0, 0);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

// ============================================================
// BACKGROUND
// ============================================================
function drawBackground() {
  // Deep vertical gradient keyed to current layer tint
  const layer = LAYERS[Math.max(0, Math.min(8, S.currentLayer))];
  const tint = layer.tint;
  const bg = ctx.createLinearGradient(0, 0, 0, CFG.H);
  bg.addColorStop(0, CFG.C_BG_DEEP);
  bg.addColorStop(0.45, tint);
  bg.addColorStop(1, CFG.C_EARTH_D);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  // Parallax cave ceilings (drift up when falling)
  drawRockLayer(0.12, 30, 0, '#0A0718');
  drawRockLayer(0.26, 60, 0, '#08051A');

  // Per-layer neon graffiti — draw for visible layers
  drawNeonForVisibleLayers();

  // Rock silhouettes bottom
  drawRockLayer(0.18, 90, CFG.H, '#09061A');
  drawRockLayer(0.38, 140, CFG.H, '#090614');
}

function drawRockLayer(par, amp, baseScreenY, color) {
  const offX = S.camX * par;
  const offY = S.camY * par;
  const step = 150;
  const startX = -160 - (((offX % step) + step) % step);
  ctx.fillStyle = color;
  ctx.beginPath();
  if (baseScreenY < CFG.H * 0.5) {
    ctx.moveTo(-40, -60);
    for (let x = startX; x < CFG.W + step + 40; x += step) {
      const n = Math.floor((x + offX) / step);
      const h1 = amp * (0.35 + 0.65 * prng(n * 0.73));
      const h2 = amp * (0.2 + 0.8 * prng(n * 1.37 + 0.4));
      ctx.lineTo(x, baseScreenY - offY * 0.3 + h1);
      ctx.lineTo(x + step * 0.4, baseScreenY - offY * 0.3 + h2 * 1.3);
      ctx.lineTo(x + step * 0.6, baseScreenY - offY * 0.3 + h1);
    }
    ctx.lineTo(CFG.W + 80, -60);
  } else {
    ctx.moveTo(-40, CFG.H + 60);
    for (let x = startX; x < CFG.W + step + 40; x += step) {
      const n = Math.floor((x + offX) / step) + 17;
      const h1 = amp * (0.35 + 0.65 * prng(n * 0.73));
      const h2 = amp * (0.2 + 0.8 * prng(n * 1.37 + 0.4));
      ctx.lineTo(x, baseScreenY - offY * 0.3 - h1);
      ctx.lineTo(x + step * 0.5, baseScreenY - offY * 0.3 - h2 * 1.2);
    }
    ctx.lineTo(CFG.W + 80, CFG.H + 60);
  }
  ctx.closePath();
  ctx.fill();
}

function drawNeonForVisibleLayers() {
  // Figure out which layer Y ranges are visible on screen
  const topWorldY = S.camY;
  const botWorldY = S.camY + CFG.H;
  const loL = Math.max(0, currentLayerIdx(botWorldY));
  const hiL = Math.min(CFG.LAYER_COUNT - 1, currentLayerIdx(topWorldY));
  for (let L = loL; L <= hiL; L++) {
    const words = NEON_WORDS_BY_LAYER[L];
    const layerTop = layerTopY(L);
    const layerBot = layerTop + CFG.LAYER_H;
    const spacing = 420;
    const off = S.camX * 0.22;
    const start = Math.floor((off - 260) / spacing);
    const end = Math.floor((off + CFG.W + 260) / spacing);
    for (let i = start; i <= end; i++) {
      const seed = prng(i * 13.7 + L * 91.1 + 4.9);
      if (seed < 0.35) continue;
      const text = words[(prng(i * 2.11 + L) * words.length) | 0];
      const color = NEON_COLORS[(prng(i * 5.33 + L * 1.3) * NEON_COLORS.length) | 0];
      const sizeRaw = 18 + prng(i * 3.1 + L) * 22;
      const size = Math.max(10, 4 * Math.round(sizeRaw / 4));
      const rot = (prng(i * 8.2 + L) - 0.5) * 0.3;
      const yRel = prng(i * 7.11 + L * 0.7) * (CFG.LAYER_H - 120) + 40;
      const worldY = layerTop + yRel;
      const xJitter = (prng(i * 4.27 + L) - 0.5) * spacing * 0.5;
      const worldX = i * spacing + xJitter;
      const screenX = worldX - S.camX * 0.22;
      const screenY = worldY - S.camY * 0.4;
      if (screenX < -240 || screenX > CFG.W + 240) continue;
      if (screenY < -80 || screenY > CFG.H + 80) continue;
      const sprite = getNeonSprite(text, size, color);
      ctx.save();
      ctx.translate(screenX, screenY);
      ctx.rotate(rot);
      ctx.globalAlpha = 0.65;
      ctx.drawImage(sprite.canvas, -sprite.w * 0.5, -sprite.h * 0.5);
      ctx.restore();
    }
  }
}

// ============================================================
// WALLS — thin decorative cave walls at the horizontal edges of the world
// ============================================================
function drawWalls() {
  // Left wall
  drawWall(0);
  // Right wall
  drawWall(WORLD.worldW);
}

function drawWall(worldX) {
  const sx = worldX - S.camX;
  if (sx < -120 || sx > CFG.W + 120) return;
  const topScreen = 0 - S.camY + (-200);
  const botScreen = WORLD.bottomY - S.camY + 40;
  const y0 = Math.max(-40, topScreen);
  const y1 = Math.min(CFG.H + 40, botScreen);
  if (y1 < y0) return;
  const grad = ctx.createLinearGradient(sx - 50, 0, sx + 50, 0);
  grad.addColorStop(0, 'rgba(0,0,0,0.0)');
  grad.addColorStop(0.35, 'rgba(14,10,20,0.55)');
  grad.addColorStop(1, 'rgba(8,6,14,0.9)');
  ctx.fillStyle = grad;
  const dir = worldX === 0 ? -1 : 1;
  ctx.fillRect(sx + (dir < 0 ? -80 : 0), y0, 80, y1 - y0);
  // Jagged rock edge
  ctx.fillStyle = '#0E0A14';
  ctx.beginPath();
  ctx.moveTo(sx, y0);
  const step = 50;
  for (let y = y0; y < y1; y += step) {
    const n = Math.floor(y / step) + (worldX === 0 ? 5 : 9);
    const jut = 18 + prng(n * 0.7) * 30;
    ctx.lineTo(sx + jut * dir, y + step * 0.3);
    ctx.lineTo(sx + (jut + 10) * dir, y + step * 0.5);
    ctx.lineTo(sx + jut * 0.4 * dir, y + step * 0.8);
  }
  ctx.lineTo(sx, y1);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// RAILS
// ============================================================
function drawRails() {
  // Filter to rails whose screen bounds intersect the viewport
  const vL = S.camX - 40, vR = S.camX + CFG.W + 40;
  const vT = S.camY - 40, vB = S.camY + CFG.H + 80;
  const collapsed = S.mech ? S.mech.collapsed : null;
  const crumbling = S.mech ? S.mech.crumbling : null;
  for (const r of WORLD.rails) {
    if (collapsed && collapsed.has(r)) continue;
    if (r.x2 < vL || r.x1 > vR) continue;
    const minY = Math.min(r.y1, r.y2);
    const maxY = Math.max(r.y1, r.y2);
    if (maxY < vT - 40 || minY > vB + 40) continue;
    let shakeX = 0, shakeY = 0;
    if (crumbling && crumbling.has(r)) {
      // Rail that has been landed on in FRAUD — shake visibly to warn
      const info = crumbling.get(r);
      const age = S.playTime - info.startT;
      const L = LAYERS[r.layerIdx];
      const delay = (L && L.hazard && L.hazard.crumbleDelay) ? L.hazard.crumbleDelay : 0.42;
      const t = Math.min(1, age / delay);
      const amp = 1 + t * 3;
      shakeX = (Math.random() - 0.5) * amp;
      shakeY = (Math.random() - 0.5) * amp;
    }
    if (shakeX || shakeY) {
      ctx.save();
      ctx.translate(shakeX, shakeY);
      drawRail(r);
      ctx.restore();
    } else {
      drawRail(r);
    }
  }
}

function drawRail(rail) {
  // Impact bob: the rail is pushed down on hit and rings out with damped cosine.
  // We apply a uniform Y-offset (whole rail moves together) to avoid breaking the
  // plank / post drawing. Strength falls off over ~0.55s.
  const bob = railImpactBob(rail, rail.impactT ?? 0.5);
  const x1 = rail.x1 - S.camX;
  const x2 = rail.x2 - S.camX;
  const y1 = rail.y1 - S.camY + bob;
  const y2 = rail.y2 - S.camY + bob;

  // Drop-shadow / support chains going down into darkness
  ctx.strokeStyle = 'rgba(18,14,26,0.8)';
  ctx.lineWidth = 2;
  const chainCount = 3;
  for (let i = 1; i <= chainCount; i++) {
    const t = i / (chainCount + 1);
    const cx = x1 + (x2 - x1) * t;
    const cy = y1 + (y2 - y1) * t;
    ctx.beginPath();
    ctx.moveTo(cx, cy + 12);
    ctx.lineTo(cx, cy + 120);
    ctx.stroke();
  }

  // Wood plank (tie)
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const len = Math.hypot(x2 - x1, y2 - y1);
  ctx.save();
  ctx.translate(x1, y1);
  ctx.rotate(angle);
  ctx.fillStyle = CFG.C_WOOD_D;
  ctx.fillRect(0, 3, len, 15);
  ctx.fillStyle = CFG.C_WOOD;
  ctx.fillRect(0, 3, len, 7);
  // Plank grooves
  ctx.strokeStyle = CFG.C_WOOD_D;
  ctx.lineWidth = 1;
  for (let px = 14; px < len - 4; px += 20) {
    ctx.beginPath();
    ctx.moveTo(px, 4);
    ctx.lineTo(px, 17);
    ctx.stroke();
  }
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 3, len, 15);
  ctx.restore();

  // Iron rail on top
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.strokeStyle = CFG.C_RAIL;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.strokeStyle = CFG.C_RAIL_HI;
  ctx.lineWidth = 1.6;
  const nx = -Math.sin(angle), ny = Math.cos(angle);
  ctx.beginPath();
  ctx.moveTo(x1 + nx * 1.8, y1 + ny * -1.6);
  ctx.lineTo(x2 + nx * 1.8, y2 + ny * -1.6);
  ctx.stroke();

  // End posts
  ctx.fillStyle = CFG.C_WOOD;
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.fillRect(x1 - 3, y1 + 2, 6, 20);
  ctx.strokeRect(x1 - 3, y1 + 2, 6, 20);
  ctx.fillRect(x2 - 3, y2 + 2, 6, 20);
  ctx.strokeRect(x2 - 3, y2 + 2, 6, 20);
}

// ============================================================
// PORTALS
// ============================================================
function drawPortals() {
  for (const p of WORLD.portals) {
    const sx = p.x - S.camX;
    const sy = p.y - S.camY;
    if (sx < -80 || sx > CFG.W + 80) continue;
    if (sy < -80 || sy > CFG.H + 120) continue;
    drawPortal(sx, sy, S.playTime + p.srcLayer * 0.7);
  }
}

function drawPortal(sx, sy, phase) {
  // Upward light column showing the catch zone
  ctx.save();
  const beamTop = sy - 240;
  const beamBot = sy - 10;
  const beamGrad = ctx.createLinearGradient(0, beamTop, 0, beamBot);
  beamGrad.addColorStop(0, 'rgba(155,123,255,0)');
  beamGrad.addColorStop(0.75, 'rgba(155,123,255,0.18)');
  beamGrad.addColorStop(1, 'rgba(232,218,255,0.40)');
  ctx.fillStyle = beamGrad;
  const beamPulse = 0.85 + 0.15 * Math.sin(phase * 3);
  const bw = 54 * beamPulse;
  ctx.fillRect(sx - bw * 0.5, beamTop, bw, beamBot - beamTop);
  // Upward-drifting sparkles in the beam
  for (let i = 0; i < 4; i++) {
    const t = ((phase * 0.8 + i * 0.25) % 1);
    const sy2 = beamBot - t * (beamBot - beamTop);
    const sx2 = sx + Math.sin(phase * 2 + i * 1.7) * 12;
    ctx.globalAlpha = 0.8 * (1 - t);
    ctx.fillStyle = '#E8DAFF';
    ctx.fillRect(sx2 - 1.5, sy2 - 1.5, 3, 3);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Rocky tunnel ring + swirling light
  ctx.save();
  ctx.translate(sx, sy - 10);

  // Outer rock mouth
  ctx.fillStyle = '#0A0812';
  ctx.beginPath();
  ctx.arc(0, 0, CFG.PORTAL_R + 10, 0, Math.PI * 2);
  ctx.fill();

  // Jagged rocky border
  ctx.fillStyle = '#1A121E';
  ctx.beginPath();
  const rings = 16;
  for (let i = 0; i <= rings; i++) {
    const a = (i / rings) * Math.PI * 2;
    const jut = 1 + 0.12 * Math.sin(i * 1.7 + phase * 0.5);
    const r = (CFG.PORTAL_R + 8) * jut;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // Inner deep darkness
  const gradD = ctx.createRadialGradient(0, 0, 3, 0, 0, CFG.PORTAL_R);
  gradD.addColorStop(0, '#1A1030');
  gradD.addColorStop(0.55, '#06050C');
  gradD.addColorStop(1, '#030309');
  ctx.fillStyle = gradD;
  ctx.beginPath();
  ctx.arc(0, 0, CFG.PORTAL_R, 0, Math.PI * 2);
  ctx.fill();

  // Violet glow ring (swirling)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++) {
    const a = phase * 1.5 + i * 2.1;
    ctx.rotate(0.1);
    ctx.strokeStyle = i === 0 ? CFG.C_PORTAL : CFG.C_PORTAL_HI;
    ctx.lineWidth = 3 - i * 0.8;
    ctx.globalAlpha = 0.7 - i * 0.2;
    ctx.beginPath();
    ctx.arc(0, 0, CFG.PORTAL_R - 6 - i * 6, a, a + Math.PI * 1.3);
    ctx.stroke();
  }
  ctx.restore();

  // Sparkles
  for (let i = 0; i < 5; i++) {
    const a = phase * 2 + i * 1.25;
    const r = CFG.PORTAL_R * (0.4 + 0.5 * ((Math.sin(phase * 3 + i) + 1) * 0.5));
    const x = Math.cos(a) * r, y = Math.sin(a) * r * 0.9;
    ctx.fillStyle = CFG.C_PORTAL_HI;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(x - 1.2, y - 1.2, 2.4, 2.4);
  }
  ctx.globalAlpha = 1;

  // Up arrow inside
  ctx.fillStyle = CFG.C_PORTAL_HI;
  ctx.globalAlpha = 0.55 + 0.35 * Math.sin(phase * 4);
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.lineTo(10, -6);
  ctx.lineTo(4, -6);
  ctx.lineTo(4, 10);
  ctx.lineTo(-4, 10);
  ctx.lineTo(-4, -6);
  ctx.lineTo(-10, -6);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ============================================================
// SPIKE PIT
// ============================================================
function drawSpikePit() {
  const topScreen = WORLD.spikeY - S.camY;
  if (topScreen > CFG.H + 20) return;

  // Ominous glow before spikes
  const glowGrad = ctx.createLinearGradient(0, topScreen - 140, 0, topScreen);
  glowGrad.addColorStop(0, 'rgba(255,30,60,0)');
  glowGrad.addColorStop(1, 'rgba(255,40,70,0.25)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, topScreen - 140, CFG.W, 140);

  // Dark pit floor
  ctx.fillStyle = '#120608';
  ctx.fillRect(0, topScreen, CFG.W, CFG.H - topScreen + 40);

  // Spikes — big and serrated, across the screen
  const sp = 36;
  const baseY = topScreen + CFG.SPIKE_H;
  const leftWorld = S.camX;
  const startI = Math.floor(leftWorld / sp) - 1;
  const endI = Math.ceil((leftWorld + CFG.W) / sp) + 1;
  for (let i = startI; i <= endI; i++) {
    const worldX = i * sp;
    const sx = worldX - S.camX;
    const jut = prng(i * 0.91) * 10;
    ctx.fillStyle = CFG.C_SPIKE;
    ctx.beginPath();
    ctx.moveTo(sx, baseY);
    ctx.lineTo(sx + sp * 0.5, topScreen - jut);
    ctx.lineTo(sx + sp, baseY);
    ctx.closePath();
    ctx.fill();
    // Highlight edge
    ctx.strokeStyle = CFG.C_SPIKE_HI;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx + sp * 0.5, topScreen - jut);
    ctx.lineTo(sx + sp, baseY);
    ctx.stroke();
    ctx.strokeStyle = CFG.C_BLACK;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, baseY);
    ctx.lineTo(sx + sp * 0.5, topScreen - jut);
    ctx.lineTo(sx + sp, baseY);
    ctx.stroke();
  }

  // Bone pile base
  ctx.fillStyle = '#050307';
  ctx.fillRect(0, baseY, CFG.W, CFG.H - baseY + 40);
}

// ============================================================
// FINISH LINE
// ============================================================
function drawFinish() {
  if (!WORLD.finish) return;
  const sx = WORLD.finish.x - S.camX;
  const sy = WORLD.finish.y - S.camY;
  if (sx < -80 || sx > CFG.W + 80) return;

  // Pole
  ctx.fillStyle = '#D0C8B8';
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.fillRect(sx - 2, sy - 120, 4, 128);
  ctx.strokeRect(sx - 2, sy - 120, 4, 128);

  // Waving checkered flag
  const t = S.playTime * 3;
  const flagW = 54, flagH = 32;
  ctx.save();
  ctx.translate(sx + 2, sy - 114);
  const cols = 6, rows = 4;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const on = (r + c) % 2 === 0;
      const cellW = flagW / cols, cellH = flagH / rows;
      const x = c * cellW;
      const y = r * cellH;
      const wave = Math.sin(t + c * 0.8) * 3;
      ctx.fillStyle = on ? '#FFFFFF' : '#0A0A10';
      ctx.fillRect(x, y + wave, cellW + 0.5, cellH + 0.5);
    }
  }
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(0, 0, flagW, flagH);
  ctx.restore();

  // "EXIT" neon above
  drawNeonText('EXIT', sx, sy - 150, 24, CFG.C_NEON_C, 0);

  // Finish line tape across the rails
  const beamTop = sy - 20;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const glow = ctx.createLinearGradient(sx - 4, beamTop, sx + 4, beamTop + 80);
  glow.addColorStop(0, 'rgba(255,220,120,0.8)');
  glow.addColorStop(1, 'rgba(255,220,120,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx - 10, beamTop, 20, 80);
  ctx.restore();
  ctx.strokeStyle = '#FFE38A';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(sx, beamTop);
  ctx.lineTo(sx, beamTop + 80);
  ctx.stroke();
  ctx.setLineDash([]);
}

// ============================================================
// HAZARD VISUALS (drawn in world-space after rails)
// ============================================================
function drawHazards() {
  if (!S.mech) return;
  // The drawing order matters only to taste — hazards near the foreground are
  // drawn later. We draw each layer's hazard visuals if any part of the layer
  // is visible.
  const topWorldY = S.camY - 40;
  const botWorldY = S.camY + CFG.H + 40;

  for (let li = 0; li < LAYERS.length; li++) {
    const L = LAYERS[li];
    const hz = L.hazard;
    if (!hz) continue;
    const topY = layerTopY(li);
    const botY = topY + CFG.LAYER_H;
    if (botY < topWorldY || topY > botWorldY) continue;

    if (hz.type === 'treachery') drawTreachery(li, hz);
    else if (hz.type === 'heresy') drawHeresy(li, hz);
    else if (hz.type === 'wrath')  drawWrath(li, hz);
    else if (hz.type === 'violence') drawViolence(li, hz);
    else if (hz.type === 'greed') drawGreed(li, hz);
    else if (hz.type === 'gluttony') drawGluttony(li, hz);
    else if (hz.type === 'limbo') drawLimbo(li, hz);
    // fraud has its visual built into drawRails (shake); no extra world visual
    // lust is drawn in HUD (arrow)
  }
}

function drawTreachery(li, hz) {
  // Give traitor rails a cold shimmer tell — a frosted highlight over their top.
  const traitorSet = new Set(hz.traitors || []);
  const rails = railsOfLayer(li);
  const t = S.playTime;
  for (let i = 0; i < rails.length; i++) {
    if (!traitorSet.has(i)) continue;
    const r = rails[i];
    if (S.mech.collapsed.has(r)) continue;
    const x1 = r.x1 - S.camX;
    const y1 = r.y1 - S.camY;
    const x2 = r.x2 - S.camX;
    const y2 = r.y2 - S.camY;
    if (x2 < -40 || x1 > CFG.W + 40) continue;
    const shimmer = 0.35 + 0.35 * Math.sin(t * 4 + i * 1.3);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = `rgba(170, 220, 255, ${shimmer})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1 - 2);
    ctx.lineTo(x2, y2 - 2);
    ctx.stroke();
    // A faint snow dusting along the top
    ctx.fillStyle = `rgba(220, 240, 255, ${0.3 * shimmer})`;
    const steps = 10;
    for (let s = 0; s < steps; s++) {
      const ft = s / steps;
      const fx = x1 + (x2 - x1) * ft;
      const fy = y1 + (y2 - y1) * ft;
      ctx.fillRect(fx - 1, fy - 3, 2, 2);
    }
    ctx.restore();
  }
}

function drawHeresy(li, hz) {
  // Fire creeps along rails from each ignition point.
  const rails = railsOfLayer(li);
  for (const r of rails) {
    const arr = S.mech.fire.get(r);
    if (!arr || arr.length === 0) continue;
    for (const f of arr) {
      const radius = f.ageRadius || 0;
      const x0 = Math.max(r.x1, f.x - radius);
      const x1 = Math.min(r.x2, f.x + radius);
      const y0w = railYAt(r, x0);
      const y1w = railYAt(r, x1);
      const sx0 = x0 - S.camX, sy0 = y0w - S.camY;
      const sx1 = x1 - S.camX, sy1 = y1w - S.camY;
      if (sx1 < -40 || sx0 > CFG.W + 40) continue;
      // Fire body
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const grd = ctx.createLinearGradient(0, sy0 - 28, 0, sy0 + 4);
      grd.addColorStop(0, 'rgba(255, 90, 30, 0)');
      grd.addColorStop(0.45, 'rgba(255, 170, 40, 0.55)');
      grd.addColorStop(1, 'rgba(255, 240, 120, 0.85)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(sx0, sy0 + 2);
      // wavy top edge
      const samples = Math.max(6, Math.floor((sx1 - sx0) / 14));
      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const x = sx0 + (sx1 - sx0) * t;
        const yb = sy0 + (sy1 - sy0) * t;
        const height = 22 + Math.sin(t * 7 + S.playTime * 6 + (x * 0.05)) * 6;
        ctx.lineTo(x, yb - height);
      }
      ctx.lineTo(sx1, sy1 + 2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      // Embers
      if (Math.random() < 0.4) {
        S.particles.push({
          x: f.x + (Math.random() - 0.5) * (radius * 0.8),
          y: y0w - 6,
          vx: (Math.random() - 0.5) * 40,
          vy: -80 - Math.random() * 80,
          life: 0.5, maxLife: 0.7,
          size: 2, color: Math.random() < 0.5 ? '#FF9040' : '#FFDC70',
          rot: 0, rotV: 0,
        });
      }
    }
  }
}

function drawWrath(li, hz) {
  if (!S.mech.tide.active) return;
  const tideY = S.mech.tide.y;
  const topY = layerTopY(li);
  const botY = topY + CFG.LAYER_H;
  const sy = tideY - S.camY;
  if (sy > CFG.H + 20) return;
  // Blood surface
  ctx.save();
  const grd = ctx.createLinearGradient(0, sy - 40, 0, sy + 60);
  grd.addColorStop(0, 'rgba(120, 14, 20, 0)');
  grd.addColorStop(0.4, 'rgba(150, 20, 28, 0.7)');
  grd.addColorStop(1, 'rgba(110, 10, 18, 0.95)');
  ctx.fillStyle = grd;
  // Wavy surface
  ctx.beginPath();
  ctx.moveTo(-40, sy + 80);
  const steps = 24;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = -40 + (CFG.W + 80) * t;
    const y = sy + Math.sin(t * 6 + S.playTime * 2.2) * 4;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(CFG.W + 40, sy + 80);
  ctx.lineTo(CFG.W + 40, CFG.H + 40);
  ctx.lineTo(-40, CFG.H + 40);
  ctx.closePath();
  ctx.fill();
  // Surface highlight
  ctx.strokeStyle = 'rgba(230, 80, 80, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = -40 + (CFG.W + 80) * t;
    const y = sy + Math.sin(t * 6 + S.playTime * 2.2) * 4;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawViolence(li, hz) {
  // Telegraphs — red shadow columns
  const topY = layerTopY(li);
  const floorY = topY + CFG.LAYER_H;
  for (const col of S.mech.violenceState) {
    if (col.layerIdx !== li) continue;
    // Compute where in the period we are.
    const period = hz.period;
    const tele = hz.telegraph || 0.55;
    const phase = ((S.playTime - col.nextFireAt) % period + period) % period;
    const sinceDrop = phase;
    const untilDrop = period - phase;
    const isTelegraphing = untilDrop < tele;
    const sx = col.x - S.camX;
    if (sx < -40 || sx > CFG.W + 40) continue;
    if (isTelegraphing) {
      const k = 1 - untilDrop / tele;
      ctx.save();
      ctx.globalAlpha = 0.3 + k * 0.45;
      const grd = ctx.createLinearGradient(0, topY - 180 - S.camY, 0, floorY - S.camY);
      grd.addColorStop(0, 'rgba(255, 40, 60, 0.0)');
      grd.addColorStop(0.5, 'rgba(255, 40, 60, 0.6)');
      grd.addColorStop(1, 'rgba(255, 40, 60, 0.0)');
      ctx.fillStyle = grd;
      const w = 20 + k * 10;
      ctx.fillRect(sx - w * 0.5, topY - 180 - S.camY, w, CFG.LAYER_H + 220);
      ctx.restore();
    }
  }
  // Falling spikes
  for (const sp of S.mech.fallingSpikes) {
    if (sp.layerIdx !== li) continue;
    const x = sp.x - S.camX;
    const y = sp.y - S.camY;
    if (x < -40 || x > CFG.W + 40) continue;
    ctx.save();
    // Streak
    ctx.strokeStyle = 'rgba(255, 80, 100, 0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - 40);
    ctx.lineTo(x, y + 20);
    ctx.stroke();
    // Spike
    ctx.fillStyle = CFG.C_SPIKE_HI;
    ctx.strokeStyle = CFG.C_BLACK;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + 30);
    ctx.lineTo(x - 10, y - 14);
    ctx.lineTo(x + 10, y - 14);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = CFG.C_SPIKE;
    ctx.beginPath();
    ctx.moveTo(x, y + 30);
    ctx.lineTo(x - 10, y - 14);
    ctx.lineTo(x, y - 14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawGreed(li, hz) {
  const topY = layerTopY(li);
  for (let i = 0; i < hz.coins.length; i++) {
    const key = '5:' + i;
    if (S.mech.coinsTaken.has(key)) continue;
    const cx = hz.coins[i].x - S.camX;
    const cy = topY + hz.coins[i].y - S.camY;
    if (cx < -40 || cx > CFG.W + 40) continue;
    const pulse = 0.85 + 0.15 * Math.sin(S.playTime * 6 + i * 0.7);
    const r = 11 * pulse;
    ctx.save();
    ctx.shadowColor = '#F4D03F';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#F4D03F';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#FFF2A8';
    ctx.beginPath();
    ctx.arc(cx - r * 0.35, cy - r * 0.35, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#8A6610';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    // "$" engraved
    ctx.fillStyle = '#8A6610';
    ctx.font = 'bold 12px Impact, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', cx, cy + 1);
    ctx.restore();
  }
}

function drawGluttony(li, hz) {
  const rails = railsOfLayer(li);
  for (const s of (hz.slush || [])) {
    const r = rails[s.railIdx];
    if (!r) continue;
    const x0 = r.x1 + (r.x2 - r.x1) * s.t0;
    const x1 = r.x1 + (r.x2 - r.x1) * s.t1;
    const y0 = railYAt(r, x0);
    const y1 = railYAt(r, x1);
    const sx0 = x0 - S.camX, sy0 = y0 - S.camY;
    const sx1 = x1 - S.camX, sy1 = y1 - S.camY;
    if (sx1 < -40 || sx0 > CFG.W + 40) continue;
    ctx.save();
    // Slush glob — uneven ovals above the rail
    const grd = ctx.createLinearGradient(0, sy0 - 12, 0, sy0 + 4);
    grd.addColorStop(0, 'rgba(80, 55, 20, 0.0)');
    grd.addColorStop(1, 'rgba(55, 38, 12, 0.92)');
    ctx.fillStyle = grd;
    const samples = Math.max(8, Math.floor((sx1 - sx0) / 16));
    ctx.beginPath();
    ctx.moveTo(sx0, sy0);
    for (let i = 0; i <= samples; i++) {
      const t = i / samples;
      const x = sx0 + (sx1 - sx0) * t;
      const yb = sy0 + (sy1 - sy0) * t;
      const bulge = 6 + Math.sin(t * 9 + S.playTime * 1.2) * 3;
      ctx.lineTo(x, yb - bulge);
    }
    ctx.lineTo(sx1, sy1);
    ctx.closePath();
    ctx.fill();
    // Chunks
    ctx.fillStyle = 'rgba(110, 75, 30, 0.75)';
    for (let i = 0; i < 5; i++) {
      const t = (i + 0.5) / 5;
      const x = sx0 + (sx1 - sx0) * t;
      const yb = sy0 + (sy1 - sy0) * t;
      ctx.beginPath();
      ctx.arc(x, yb - 4, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawLimbo(li, hz) {
  if (!hz.bell) return;
  const topY = layerTopY(li);
  const bx = hz.bell.x - S.camX;
  const by = topY + hz.bell.y - S.camY;
  if (bx < -80 || bx > CFG.W + 80) return;
  const struck = S.mech.limboState.judged;
  // Support beam
  ctx.fillStyle = '#4C3A2A';
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.fillRect(bx - 40, by - 60, 80, 6);
  ctx.strokeRect(bx - 40, by - 60, 80, 6);
  // Chain
  ctx.strokeStyle = '#777060';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx, by - 54);
  ctx.lineTo(bx, by - 14);
  ctx.stroke();
  // Bell body
  const swing = struck ? Math.sin(S.playTime * 14) * 0.3 : Math.sin(S.playTime * 1.4) * 0.04;
  ctx.save();
  ctx.translate(bx, by - 14);
  ctx.rotate(swing);
  ctx.fillStyle = '#E2B65C';
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-20, 0);
  ctx.bezierCurveTo(-22, 22, -14, 36, 0, 36);
  ctx.bezierCurveTo(14, 36, 22, 22, 20, 0);
  ctx.lineTo(22, -4);
  ctx.lineTo(-22, -4);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Rim
  ctx.fillStyle = '#A8832A';
  ctx.fillRect(-22, -4, 44, 4);
  // Highlight
  ctx.fillStyle = '#FFF0B0';
  ctx.beginPath();
  ctx.arc(-8, 8, 4, 0, Math.PI * 2);
  ctx.fill();
  // Clapper
  ctx.fillStyle = '#555045';
  ctx.beginPath();
  ctx.arc(0, 28, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  // Glow halo
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pulse = struck ? (1 - Math.min(1, S.stateTime * 0.4)) : 0.35 + 0.2 * Math.sin(S.playTime * 2);
  const glow = ctx.createRadialGradient(bx, by + 6, 6, bx, by + 6, 90);
  glow.addColorStop(0, `rgba(255, 235, 150, ${0.45 * pulse})`);
  glow.addColorStop(1, 'rgba(255, 235, 150, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(bx - 100, by - 60, 200, 160);
  ctx.restore();
  // "STRIKE AT APEX" hint
  if (!struck) {
    ctx.save();
    ctx.font = '900 12px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFE38A';
    ctx.shadowColor = '#C9A555';
    ctx.shadowBlur = 6;
    ctx.fillText('STRIKE AT APEX', bx, by - 74);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ============================================================
// CART
// ============================================================
function drawCart(renderX, renderY, rot, airborne) {
  ctx.save();
  ctx.translate(renderX, renderY);
  ctx.rotate(rot);
  const [sclX, sclY] = getCartSquashScale();
  if (sclX !== 1 || sclY !== 1) ctx.scale(sclX, sclY);

  const bw = CFG.CART_W, bh = CFG.CART_H;

  drawWheel(-bw * 0.36, 0);
  drawWheel( bw * 0.36, 0);

  ctx.lineJoin = 'round';
  ctx.lineWidth = CFG.OUTLINE;
  ctx.strokeStyle = CFG.C_BLACK;

  ctx.fillStyle = CFG.C_CART_D;
  ctx.fillRect(-bw * 0.5 + 4, -4, bw - 8, 4);

  ctx.fillStyle = CFG.C_CART;
  ctx.beginPath();
  ctx.moveTo(-bw * 0.5 + 3, -3);
  ctx.lineTo(-bw * 0.5 - 6, -bh);
  ctx.lineTo( bw * 0.5 + 6, -bh);
  ctx.lineTo( bw * 0.5 - 3, -3);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath();
  ctx.moveTo(-bw * 0.5 + 3, -3);
  ctx.lineTo(-bw * 0.5 - 6, -bh);
  ctx.lineTo(-bw * 0.5 + 4, -bh);
  ctx.lineTo(-bw * 0.5 + 10, -3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = CFG.C_CART_HI;
  ctx.fillRect(-bw * 0.5 + 4, -bh + 8, bw - 8, 3);

  ctx.fillStyle = CFG.C_BRASS;
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-bw * 0.5 - 6, -bh);
  ctx.lineTo( bw * 0.5 + 6, -bh);
  ctx.lineTo( bw * 0.5 + 3, -bh + 5);
  ctx.lineTo(-bw * 0.5 - 3, -bh + 5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = CFG.C_BRASS_D;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(i * 18, -bh + 2.5, 1.8, 0, Math.PI * 2);
    ctx.fill();
  }

  const lx = bw * 0.5 + 6;
  const ly = -bh + 14;
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bw * 0.5 + 2, -bh + 2);
  ctx.lineTo(lx, ly - 2);
  ctx.stroke();
  ctx.save();
  ctx.translate(lx, ly);
  ctx.shadowColor = CFG.C_LAMP;
  ctx.shadowBlur = 18;
  ctx.fillStyle = CFG.C_LAMP;
  ctx.beginPath();
  ctx.arc(0, 0, 4.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(-1, -1, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 5.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  drawRider(-2, -bh - 2);

  ctx.restore();

  // Speed lines when going fast
  if (!airborne && S.cartVX > CFG.BASE_SPEED + 40) {
    const intensity = Math.min(1, (S.cartVX - CFG.BASE_SPEED) / 220);
    ctx.save();
    ctx.strokeStyle = `rgba(255,200,120,${0.4 * intensity})`;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (let i = 0; i < 5; i++) {
      const phase = (S.playTime * 1200 + i * 45) % 70;
      const lx2 = renderX - 30 - i * 18 - phase * 0.4;
      const ly2 = renderY - 12 - i * 5;
      ctx.beginPath();
      ctx.moveTo(lx2, ly2);
      ctx.lineTo(lx2 - 24, ly2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawWheel(dx, dy) {
  ctx.save();
  ctx.translate(dx, dy - 9);
  ctx.rotate((S.cartX / 11) % (Math.PI * 2));
  ctx.lineJoin = 'round';
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = CFG.OUTLINE;

  ctx.fillStyle = '#1A1218';
  ctx.beginPath();
  ctx.arc(0, 0, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = CFG.C_BRASS;
  ctx.beginPath();
  ctx.arc(0, 0, 6.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-6, 0); ctx.lineTo(6, 0);
  ctx.moveTo(0, -6); ctx.lineTo(0, 6);
  ctx.stroke();

  ctx.restore();
}

function drawRider(dx, dy) {
  ctx.save();
  ctx.translate(dx, dy);
  ctx.lineJoin = 'round';
  ctx.strokeStyle = CFG.C_BLACK;
  ctx.lineWidth = CFG.OUTLINE;

  ctx.fillStyle = CFG.C_RIDER;
  ctx.beginPath();
  ctx.arc(0, -4, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = CFG.C_CART_D;
  ctx.beginPath();
  ctx.moveTo(-9, -6);
  ctx.lineTo(9, -6);
  ctx.lineTo(7, -11);
  ctx.lineTo(-7, -11);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.save();
  ctx.shadowColor = CFG.C_LAMP;
  ctx.shadowBlur = 10;
  ctx.fillStyle = CFG.C_LAMP;
  ctx.beginPath();
  ctx.arc(0, -11, 2.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.restore();
}

// ============================================================
// EASING & IMPACT ANIMATION
// ============================================================
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function triggerCartSquashLand(impactVY) {
  // impactVY is positive (moving down); clamp the visible squash
  const strength = Math.min(1, Math.max(0.25, impactVY / 720));
  S.cartSquashStart = S.playTime;
  S.cartSquashType = 'land';
  S.cartSquashStrength = strength;
}

function triggerCartSquashJump() {
  S.cartSquashStart = S.playTime;
  S.cartSquashType = 'jump';
  S.cartSquashStrength = 1;
}

function getCartSquashScale() {
  if (!S.cartSquashType) return [1, 1];
  const dur = S.cartSquashType === 'land' ? CFG.CART_SQUASH_LAND_DUR : CFG.CART_SQUASH_JUMP_DUR;
  const t = (S.playTime - S.cartSquashStart) / dur;
  if (t >= 1 || t < 0) { S.cartSquashType = ''; return [1, 1]; }
  const s = S.cartSquashStrength;
  if (S.cartSquashType === 'land') {
    // ease-in first (snap compression), then ease-out-back to normal (overshoot and settle)
    // Split animation into two phases:
    // 0..0.15: compress in (ease-in-quad) — fast thud
    // 0.15..1: decompress with back overshoot
    if (t < 0.15) {
      const k = t / 0.15;
      const e = k * k; // ease-in-quad
      return [1 + 0.28 * s * e, 1 - 0.35 * s * e];
    } else {
      const k = (t - 0.15) / 0.85;
      const e = easeOutBack(k);
      return [1 + 0.28 * s * (1 - e), 1 - 0.35 * s * (1 - e)];
    }
  } else if (S.cartSquashType === 'jump') {
    // Start stretched, ease back to normal (ease-out)
    const e = easeOutCubic(t);
    return [1 - 0.14 * s * (1 - e), 1 + 0.22 * s * (1 - e)];
  }
  return [1, 1];
}

function triggerRailImpact(rail, worldX, strength) {
  rail.impactAt = S.playTime;
  rail.impactStrength = strength;
  rail.impactT = Math.max(0, Math.min(1, (worldX - rail.x1) * rail.invLen));
}

function railImpactBob(rail, t01) {
  // Returns a y-offset in world pixels at parametric position t01 (0..1) along the rail.
  if (rail.impactAt === undefined) return 0;
  const age = S.playTime - rail.impactAt;
  if (age < 0 || age > CFG.RAIL_BOB_DUR) return 0;
  // Damped cosine: starts at +max (rail pushed DOWN on impact), rings out with ease-out envelope
  const ageN = age / CFG.RAIL_BOB_DUR;
  const envelope = Math.pow(1 - ageN, 2.2);
  const osc = Math.cos(age * 26);
  // Gaussian falloff around impact point along the rail
  const d = t01 - (rail.impactT ?? 0.5);
  const falloff = Math.exp(-d * d * 12);
  return rail.impactStrength * envelope * falloff * osc;
}

// ============================================================
// ANGEL GHOST
// ============================================================
function spawnGhost(x, y) {
  S.ghost = { x, y, age: 0, baseX: x };
}

function updateGhost(dt) {
  if (!S.ghost) return;
  S.ghost.age += dt;
  S.ghost.y -= CFG.GHOST_RISE * dt;
}

function drawGhost() {
  if (!S.ghost) return;
  const g = S.ghost;
  const alpha = Math.max(0, 1 - g.age / CFG.GHOST_LIFE);
  if (alpha <= 0) return;
  const wobble = Math.sin(g.age * CFG.GHOST_WOBBLE_F) * CFG.GHOST_WOBBLE_A;
  const sx = (g.baseX + wobble) - S.camX;
  const sy = g.y - S.camY;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Soft glow
  const glow = ctx.createRadialGradient(sx, sy - 4, 4, sx, sy - 4, 34);
  glow.addColorStop(0, 'rgba(255,250,220,0.55)');
  glow.addColorStop(1, 'rgba(255,250,220,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx - 40, sy - 44, 80, 80);

  // Halo
  ctx.strokeStyle = CFG.C_HALO;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = CFG.C_HALO;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.ellipse(sx, sy - 22, 11, 3.5, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Body — rounded head with wavy sheet
  ctx.fillStyle = CFG.C_ANGEL;
  ctx.strokeStyle = 'rgba(80,80,120,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(sx, sy - 12, 9, Math.PI, Math.PI * 2);
  // Wavy bottom
  const waves = 4;
  for (let i = 0; i <= waves; i++) {
    const t = i / waves;
    const wx = sx + 9 - 18 * t;
    const wy = sy - 3 + (i % 2 === 0 ? 3 : -1) + Math.sin(g.age * 3 + i) * 1.2;
    ctx.lineTo(wx, wy);
  }
  ctx.lineTo(sx - 9, sy - 12);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Tiny wings
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.ellipse(sx - 10, sy - 12, 5, 7, -0.4, 0, Math.PI * 2);
  ctx.ellipse(sx + 10, sy - 12, 5, 7, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = 'rgba(40,40,80,0.85)';
  ctx.beginPath();
  ctx.arc(sx - 2.6, sy - 12, 1.2, 0, Math.PI * 2);
  ctx.arc(sx + 2.6, sy - 12, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(40,40,80,0.7)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(sx, sy - 9, 1.8, 0, Math.PI);
  ctx.stroke();

  ctx.restore();
}

// ============================================================
// PARTICLES
// ============================================================
function stepParticles(dt, grav) {
  for (const p of S.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += grav * dt;
    p.vx *= Math.pow(0.3, dt);
    p.rot += p.rotV * dt;
    p.life -= dt;
  }
  S.particles = S.particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of S.particles) {
    const a = Math.min(1, p.life / (p.maxLife || 0.5));
    ctx.save();
    ctx.translate(p.x - S.camX, p.y - S.camY);
    ctx.rotate(p.rot);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    const s = p.size;
    ctx.fillRect(-s * 0.5, -s * 0.5, s, s);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}
