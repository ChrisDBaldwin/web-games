// ============================================================
// COLLISION
// ============================================================
function findRailLanding(prevX, prevY, curX, curY) {
  // Only consider landing if falling
  if (curY < prevY) return null;
  let best = null;
  let bestY = Infinity;
  const destroyed = S.mech ? S.mech.collapsed : null;
  for (const r of WORLD.rails) {
    if (destroyed && destroyed.has(r)) continue;
    if (curX < r.x1 || curX > r.x2) continue;
    const ry = railYAt(r, curX);
    const tPrev = Math.max(0, Math.min(1, (prevX - r.x1) * r.invLen));
    const rPrevY = r.y1 + (r.y2 - r.y1) * tPrev;
    // Crossed from above
    if (prevY <= rPrevY + 3 && curY >= ry - 1) {
      // Must be falling onto topside
      if (ry < bestY && ry >= prevY - 40) {
        bestY = ry;
        best = r;
      }
    }
  }
  return best ? { rail: best, y: bestY } : null;
}

// ============================================================
// HAZARDS — per-circle mechanics
// ============================================================
function hazardOfLayer(idx) {
  const L = LAYERS[idx];
  return L ? L.hazard : null;
}

function railsOfLayer(idx) {
  const out = [];
  for (const r of WORLD.rails) if (r.layerIdx === idx) out.push(r);
  return out;
}

// Resolve a local (per-layer) rail index to the WORLD.rails entry.
function worldRailByLocalIdx(layerIdx, localIdx) {
  const rails = railsOfLayer(layerIdx);
  return rails[localIdx] || null;
}

function showBanner(text, sub) {
  S.bannerText = text;
  S.bannerSub = sub || '';
  S.bannerAt = S.playTime;
}

function resetHazards() {
  S.mech = makeMechState();
  // Seed per-column fire-at times for violence
  for (let li = 0; li < LAYERS.length; li++) {
    const L = LAYERS[li];
    const hz = L.hazard;
    if (!hz) continue;
    if (hz.type === 'violence') {
      for (const col of hz.columns) {
        S.mech.violenceState.push({
          x: col.x,
          layerIdx: li,
          nextFireAt: (col.phase || 0) % hz.period,
          telegraphUntil: -1,
        });
      }
    }
    if (hz.type === 'wrath') {
      S.mech.tide.y = layerTopY(li) + CFG.LAYER_H + 20;
    }
  }
  S.prevLayer = -1;
  S.bannerAt = -99;
}

// Restore one circle's per-run hazard state — called when the player advances
// to a higher circle, so the floor they came from is fresh if they fall back.
function resetLayer(layerIdx) {
  if (!S.mech || layerIdx < 0 || layerIdx >= LAYERS.length) return;
  // Bring back collapsed rails and clear in-flight crumble timers / fires.
  for (const r of WORLD.rails) {
    if (r.layerIdx !== layerIdx) continue;
    S.mech.collapsed.delete(r);
    S.mech.crumbling.delete(r);
    S.mech.fire.delete(r);
  }
  // GREED — coins respawn and the portal unlocks.
  const prefix = layerIdx + ':';
  for (const k of Array.from(S.mech.coinsTaken)) {
    if (k.startsWith(prefix)) S.mech.coinsTaken.delete(k);
  }
  S.mech.portalLocked.delete(layerIdx);
  // VIOLENCE — drop any spikes that were mid-flight in this layer.
  if (S.mech.fallingSpikes.length) {
    S.mech.fallingSpikes = S.mech.fallingSpikes.filter(s => s.layerIdx !== layerIdx);
  }
  // WRATH — let re-entry re-arm the tide from the floor.
  const hz = hazardOfLayer(layerIdx);
  if (hz && hz.type === 'wrath') {
    S.mech.tide.active = false;
    S.mech.tide.y = layerTopY(layerIdx) + CFG.LAYER_H + 20;
  }
  // GLUTTONY — drop any active slow window.
  if (hz && hz.type === 'gluttony') {
    S.mech.slowUntil.t = 0;
  }
}

// Parametric position along a rail (0..1) for a given world X.
function railT(rail, x) {
  return Math.max(0, Math.min(1, (x - rail.x1) * rail.invLen));
}

// Collapse a rail (treachery / fraud crumble) with a puff of debris.
function collapseRail(rail) {
  if (S.mech.collapsed.has(rail)) return;
  S.mech.collapsed.add(rail);
  // If cart is on this rail, eject to airborne
  if (S.currentRail === rail) {
    S.currentRail = null;
    S.airborne = true;
    S.cartVY = Math.max(S.cartVY, 40);
    S.coyote = 0;
  }
  // Debris particles
  for (let i = 0; i < 14; i++) {
    const t = Math.random();
    const px = rail.x1 + (rail.x2 - rail.x1) * t;
    const py = rail.y1 + (rail.y2 - rail.y1) * t;
    S.particles.push({
      x: px, y: py,
      vx: (Math.random() - 0.5) * 220,
      vy: 30 + Math.random() * 140,
      life: 0.55 + Math.random() * 0.3, maxLife: 0.9,
      size: 3 + Math.random() * 3,
      color: Math.random() < 0.5 ? CFG.C_WOOD : CFG.C_WOOD_D,
      rot: Math.random() * Math.PI,
      rotV: (Math.random() - 0.5) * 10,
    });
  }
  S.shake = Math.max(S.shake, 3);
}

// Called right after the cart lands on a rail. Dispatches per-mechanic landing hook.
function onLand(rail, worldX) {
  if (!S.mech) return;
  const lIdx = rail.layerIdx;
  const hz = hazardOfLayer(lIdx);
  if (!hz) return;

  if (hz.type === 'treachery') {
    const localIdx = railsOfLayer(lIdx).indexOf(rail);
    if (hz.traitors && hz.traitors.includes(localIdx)) {
      // Tiny forgiveness window so the jump animation has a beat
      setTimeout(() => collapseRail(rail), 40);
      beep(110, 0.16, 'sawtooth', 0.06, 60);
    }
  } else if (hz.type === 'fraud') {
    if (!S.mech.crumbling.has(rail)) {
      S.mech.crumbling.set(rail, { startT: S.playTime });
    }
  } else if (hz.type === 'heresy') {
    // Ignite a new fire at landing point on this rail.
    let arr = S.mech.fire.get(rail);
    if (!arr) { arr = []; S.mech.fire.set(rail, arr); }
    arr.push({ x: worldX, t: S.playTime });
    beep(420, 0.14, 'square', 0.05, 170);
  } else if (hz.type === 'gluttony') {
    // Landing in slush → slow window.
    const localIdx = railsOfLayer(lIdx).indexOf(rail);
    const t = railT(rail, worldX);
    for (const s of (hz.slush || [])) {
      if (s.railIdx === localIdx && t >= s.t0 && t <= s.t1) {
        S.mech.slowUntil.t = S.playTime + (hz.slowDur || 1.3);
        beep(90, 0.22, 'square', 0.06, 55);
        // splat particles
        for (let i = 0; i < 12; i++) {
          S.particles.push({
            x: worldX + (Math.random() - 0.5) * 20,
            y: railYAt(rail, worldX),
            vx: (Math.random() - 0.5) * 160,
            vy: -40 - Math.random() * 80,
            life: 0.4 + Math.random() * 0.2, maxLife: 0.6,
            size: 3 + Math.random() * 3,
            color: Math.random() < 0.5 ? '#3A2A12' : '#55421A',
            rot: Math.random() * Math.PI,
            rotV: (Math.random() - 0.5) * 8,
          });
        }
        break;
      }
    }
  }
}

// Main hazard tick. Called at the start of physicsStep.
function updateHazards(dt) {
  if (!S.mech) return;

  // Entry banner + per-circle setup when crossing layers
  if (S.currentLayer !== S.prevLayer) {
    if (S.currentLayer > S.deepestLayer) S.deepestLayer = S.currentLayer;
    // Ascending to a higher circle restores the one we just left, so a player
    // who falls back gets a fresh attempt at it instead of the wreckage.
    if (S.prevLayer >= 0 && S.currentLayer > S.prevLayer) {
      resetLayer(S.prevLayer);
    }
    const hz = hazardOfLayer(S.currentLayer);
    if (hz) {
      const label = (LAYERS[S.currentLayer].name || '') + ' — ' + (HAZARD_BLURBS[hz.type] || '');
      showBanner('CIRCLE ' + (S.currentLayer + 1), label);
      if (hz.type === 'wrath') {
        // Start tide rising from below the current layer floor on first entry.
        S.mech.tide.y = layerTopY(S.currentLayer) + CFG.LAYER_H + 20;
        S.mech.tide.active = true;
        S.mech.tide.armedAt = S.playTime + (hz.startDelay || 0);
      } else {
        S.mech.tide.active = false;
      }
    }
    S.prevLayer = S.currentLayer;
  }

  // FRAUD: advance crumble timers; collapse overdue rails.
  for (const [rail, info] of S.mech.crumbling) {
    const hz = hazardOfLayer(rail.layerIdx);
    const delay = (hz && hz.crumbleDelay) ? hz.crumbleDelay : 0.42;
    if (S.playTime - info.startT >= delay && !S.mech.collapsed.has(rail)) {
      collapseRail(rail);
    }
  }

  // WRATH: tide rise + death check (only while player is in layer 4 or below).
  const wrathLayer = 4;
  if (S.mech.tide.active) {
    const wHz = hazardOfLayer(wrathLayer);
    if (wHz && S.playTime >= S.mech.tide.armedAt) {
      S.mech.tide.y -= (wHz.riseRate || 60) * dt; // rising = y decreases (smaller world-Y = higher)
    }
    // Clamp to layer box
    const topY = layerTopY(wrathLayer);
    const botY = topY + CFG.LAYER_H;
    if (S.mech.tide.y < topY - 40) S.mech.tide.y = topY - 40;
    if (S.mech.tide.y > botY + 20) S.mech.tide.y = botY + 20;
    // Death if cart is in or below the tide.
    if (S.currentLayer === wrathLayer && S.cartY >= S.mech.tide.y - 6) {
      die('wrath');
      return;
    }
  }

  // VIOLENCE: advance spike-column timers only while in layer 2.
  const vHz = hazardOfLayer(2);
  if (vHz) {
    for (const col of S.mech.violenceState) {
      // Advance its clock (playTime-based — columns tick whether you're in the layer or not,
      // so the rhythm stays predictable)
      const phase = (S.playTime - col.nextFireAt) % vHz.period;
      // Drop a spike at the start of each period.
      const since = S.playTime - col.nextFireAt;
      if (since >= 0) {
        // Telegraph window just before drop
        const teleStart = vHz.period - (vHz.telegraph || 0.55);
        const loopT = ((since % vHz.period) + vHz.period) % vHz.period;
        col.telegraphUntil = S.playTime + ((teleStart - loopT + vHz.period) % vHz.period);
        // Fire when loopT rolls over near zero
        if (loopT < dt * 1.05 && S.currentLayer === 2) {
          S.mech.fallingSpikes.push({
            x: col.x,
            y: layerTopY(2) - 180,
            vy: 640,
            layerIdx: 2,
            age: 0,
            life: 1.5,
          });
        }
      }
    }
  }
  // Step falling spikes and check collisions.
  const cartR = 22;
  for (const sp of S.mech.fallingSpikes) {
    sp.y += sp.vy * dt;
    sp.age += dt;
    // Hit test against cart only while in layer 2
    if (S.currentLayer === 2) {
      const dx = Math.abs(S.cartX - sp.x);
      const dy = S.cartY - sp.y;
      if (dx < 18 && dy > -8 && dy < 50) {
        die('violence');
        return;
      }
    }
    // Explode when spike passes layer floor
    const floorY = layerTopY(sp.layerIdx) + CFG.LAYER_H + 20;
    if (sp.y > floorY) sp.life = 0;
  }
  S.mech.fallingSpikes = S.mech.fallingSpikes.filter(s => s.life > 0);

  // HERESY: spread fire along rails; kill if cart touches ignited span.
  const hHz = hazardOfLayer(3);
  if (hHz) {
    const spread = hHz.spreadRate || 140;
    for (const [rail, arr] of S.mech.fire) {
      for (const f of arr) f.ageRadius = (f.ageRadius || 0) + spread * dt;
    }
    // Death check only while in heresy layer
    if (S.currentLayer === 3 && S.currentRail) {
      const arr = S.mech.fire.get(S.currentRail);
      if (arr) {
        for (const f of arr) {
          const r = f.ageRadius || 0;
          if (Math.abs(S.cartX - f.x) < r - 14) {
            die('heresy');
            return;
          }
        }
      }
    }
  }

  // LUST: sine-wave wind.
  const lHz = hazardOfLayer(7);
  if (lHz && S.currentLayer === 7) {
    const t = S.playTime;
    S.mech.wind.current = Math.sin(t * (Math.PI * 2) / (lHz.period || 2.8)) * (lHz.amplitude || 140);
    // Wind influences the cart only while airborne (it's wind, not a ground force)
    if (S.airborne) {
      S.cartVX += S.mech.wind.current * dt * 1.8;
    }
  } else {
    S.mech.wind.current *= Math.pow(0.1, dt); // decay when out of layer
  }

  // GLUTTONY: apply slow factor.
  if (S.currentLayer === 6 && S.playTime < S.mech.slowUntil.t) {
    const gHz = hazardOfLayer(6);
    const k = gHz ? (gHz.slowFactor || 0.45) : 0.45;
    S.cartVX = Math.min(S.cartVX, CFG.BASE_SPEED * k);
  }

  // GREED: coin collection + portal lock check.
  const grHz = hazardOfLayer(5);
  if (grHz && grHz.coins) {
    const topY = layerTopY(5);
    for (let i = 0; i < grHz.coins.length; i++) {
      const key = '5:' + i;
      if (S.mech.coinsTaken.has(key)) continue;
      const cx = grHz.coins[i].x;
      const cy = topY + grHz.coins[i].y;
      const dx = S.cartX - cx;
      const dy = (S.cartY - 18) - cy;
      if (Math.abs(dx) < 22 && Math.abs(dy) < 22) {
        S.mech.coinsTaken.add(key);
        // Count only coins from the current active run of layer 5
        let n = 0;
        for (const k of S.mech.coinsTaken) if (k.startsWith('5:')) n++;
        if (n > grHz.limit) {
          S.mech.portalLocked.add(5);
          beep(80, 0.6, 'sawtooth', 0.08, 40);
          showBanner('PORTAL SEALED', 'TOO MUCH GOLD');
          S.shake = Math.max(S.shake, 8);
        } else {
          beep(900, 0.08, 'sine', 0.05, 1400);
          // sparkle
          for (let j = 0; j < 8; j++) {
            S.particles.push({
              x: cx, y: cy,
              vx: (Math.random() - 0.5) * 200,
              vy: -60 - Math.random() * 160,
              life: 0.5, maxLife: 0.7,
              size: 3, color: '#F4D03F',
              rot: 0, rotV: (Math.random() - 0.5) * 8,
            });
          }
        }
      }
    }
  }

  // LIMBO: bell-strike judgement.
  const liHz = hazardOfLayer(8);
  if (liHz && liHz.bell && S.currentLayer === 8 && !S.mech.limboState.judged) {
    const b = liHz.bell;
    const topY = layerTopY(8);
    const bx = b.x, by = topY + b.y;
    const dx = S.cartX - bx;
    const dy = (S.cartY - 24) - by;
    if (Math.abs(dx) < 32 && Math.abs(dy) < b.tolerance) {
      // Must be at jump apex (|vy| small) and at/above min speed.
      const apex = Math.abs(S.cartVY) < 80;
      const fast = S.cartVX >= (b.minSpeed || 440);
      if (S.airborne && apex && fast) {
        S.mech.limboState.judged = true;
        S.mech.limboState.armed = false;
        // Bell-ring
        beep(1200, 0.22, 'triangle', 0.09, 1800);
        setTimeout(() => beep(1800, 0.26, 'sine', 0.07, 2400), 60);
        for (let i = 0; i < 40; i++) {
          S.particles.push({
            x: bx, y: by,
            vx: (Math.random() - 0.5) * 320,
            vy: -60 + (Math.random() - 0.5) * 280,
            life: 0.8, maxLife: 1.2,
            size: 3 + Math.random() * 3,
            color: i % 2 ? CFG.C_LAMP : '#FFFFFF',
            rot: 0, rotV: (Math.random() - 0.5) * 12,
          });
        }
        S.shake = 10;
        // Snap cart to the finish so the win pose reads correctly
        if (WORLD.finish) {
          S.cartX = WORLD.finish.x;
          S.cartY = WORLD.finish.y;
        }
        win();
        return;
      }
    }
  }
}

// Is the layer's portal gated closed? (greed lock)
function portalIsLocked(srcLayer) {
  return !!(S.mech && S.mech.portalLocked.has(srcLayer));
}

// ============================================================
// PHYSICS
// ============================================================
function physicsStep(dt) {
  if (S.state !== 'playing') return;

  S.prevCartX = S.cartX;
  S.prevCartY = S.cartY;
  S.prevRot = S.cartRot;
  S.playTime += dt;

  if (jumpPressed) {
    S.jumpBuffer = CFG.JUMP_BUFFER;
    jumpPressed = false;
  }
  S.jumpBuffer = Math.max(0, S.jumpBuffer - dt);
  S.coyote = Math.max(0, S.coyote - dt);
  S.portalCooldown = Math.max(0, S.portalCooldown - dt);

  // Phase 1: check if the current rail is still valid
  if (!S.airborne && S.currentRail) {
    if (S.cartX < S.currentRail.x1 || S.cartX > S.currentRail.x2) {
      S.airborne = true;
      S.coyote = CFG.COYOTE;
      // Carry momentum: keep any slope-implied vertical velocity
      S.cartVY = S.cartVX * S.currentRail.slope;
      S.currentRail = null;
    }
  }

  // Phase 2: jump
  if (S.jumpBuffer > 0 && (!S.airborne || S.coyote > 0)) {
    let slope = 0;
    const jumpRail = S.currentRail;
    if (jumpRail) slope = jumpRail.slope;
    S.cartVY = S.cartVX * slope - CFG.JUMP_V;
    S.airborne = true;
    S.currentRail = null;
    S.coyote = 0;
    S.jumpBuffer = 0;
    sndJump();
    spawnJumpParticles();
    triggerCartSquashJump();
    if (jumpRail) triggerRailImpact(jumpRail, S.cartX, 5);
  }

  // Phase 3: motion
  const targetSpeed = CFG.BASE_SPEED;
  if (S.airborne) {
    // Variable jump height: if the button was released while rising fast, cap
    // upward velocity to JUMP_V_MIN so a short tap gives a short hop and a long
    // hold keeps the full arc.
    if (!jumpHeld && S.cartVY < -CFG.JUMP_V_MIN) {
      S.cartVY = -CFG.JUMP_V_MIN;
    }
    // Lower gravity while rising gives a floatier, more forgiving jump arc
    const g = S.cartVY < 0 ? CFG.JUMP_HOLD_G : CFG.GRAVITY;
    S.cartVY += g * dt;
    S.cartX += S.cartVX * dt;
    S.cartY += S.cartVY * dt;
    // Clamp to world horizontally
    if (S.cartX < 10) { S.cartX = 10; S.cartVX = Math.max(CFG.MIN_SPEED, S.cartVX); }
    if (S.cartX > WORLD.worldW - 10) S.cartX = WORLD.worldW - 10;

    const targetRot = Math.atan2(S.cartVY, Math.max(80, S.cartVX));
    S.cartRot += (targetRot - S.cartRot) * Math.min(1, dt * 7);

    // Check rail landing
    const hit = findRailLanding(S.prevCartX, S.prevCartY, S.cartX, S.cartY);
    if (hit) {
      const impactVY = Math.max(0, S.cartVY);
      S.cartY = hit.y;
      S.cartVY = 0;
      S.airborne = false;
      S.currentRail = hit.rail;
      S.cartRot = Math.atan(hit.rail.slope);
      S.cartVX = Math.max(CFG.MIN_SPEED, S.cartVX);
      sndLand();
      spawnLandingParticles();
      triggerCartSquashLand(impactVY);
      triggerRailImpact(hit.rail, S.cartX, Math.min(14, impactVY * 0.024));
      onLand(hit.rail, S.cartX);
    }
  } else if (S.currentRail) {
    const r = S.currentRail;
    const slope = r.slope;
    const dvx = CFG.SLOPE_G * slope - CFG.SPEED_DRAG * (S.cartVX - targetSpeed);
    S.cartVX = Math.max(CFG.MIN_SPEED, Math.min(CFG.MAX_SPEED, S.cartVX + dvx * dt));
    S.cartX += S.cartVX * dt;
    S.cartY = railYAt(r, Math.max(r.x1, Math.min(r.x2, S.cartX)));
    const targetRot = Math.atan(slope);
    S.cartRot += (targetRot - S.cartRot) * Math.min(1, dt * 12);
  }

  // Portal touch — generous zone, biased to the right & tall so overhead jumps still count
  if (S.portalCooldown <= 0) {
    for (const p of WORLD.portals) {
      if (portalIsLocked(p.srcLayer)) continue;
      const relX = S.cartX - p.x;
      const relY = (S.cartY - 22) - (p.y - 10);
      if (relX >= -60 && relX <= 110 && relY >= -450 && relY <= 80) {
        // Teleport
        spawnPortalParticles(p.x, p.y - 10);
        S.cartX = p.tgtX;
        S.cartY = p.tgtY;
        S.cartVY = 0;
        S.cartRot = 0;
        S.airborne = false;
        S.currentRail = null;
        S.portalCooldown = 0.3;
        S.shake = 8;
        // Snap camera & interpolation refs to avoid a flash
        S.prevCartX = S.cartX;
        S.prevCartY = S.cartY;
        S.prevRot = 0;
        S.camX = S.cartX - CFG.CART_SCREEN_X;
        S.camY = S.cartY - CFG.CART_SCREEN_Y;
        spawnPortalParticles(p.tgtX, p.tgtY - 10);
        sndPortal();
        // Snap currentRail by finding rail under cart
        for (const r of WORLD.rails) {
          if (S.cartX >= r.x1 && S.cartX <= r.x2) {
            const ry = railYAt(r, S.cartX);
            if (Math.abs(ry - S.cartY) < 6) {
              S.currentRail = r;
              S.cartY = ry;
              break;
            }
          }
        }
        if (!S.currentRail) S.airborne = true;
        break;
      }
    }
  }

  // Finish line touch — if the final layer has a bell hazard, the bell must be
  // struck first (the bell strike calls win() directly from updateHazards)
  if (WORLD.finish) {
    const f = WORLD.finish;
    const liHz = hazardOfLayer(CFG.LAYER_COUNT - 1);
    const bellRequired = liHz && liHz.type === 'limbo' && liHz.bell;
    const bellPassed = bellRequired && S.mech && S.mech.limboState.judged;
    if (!bellRequired || bellPassed) {
      if (Math.abs(S.cartX - f.x) < CFG.FINISH_W * 0.5 && Math.abs((S.cartY - 22) - f.y) < 80) {
        win();
        return;
      }
    }
  }

  // Spike / pit
  if (S.cartY > WORLD.spikeY - 10) {
    die();
    return;
  }

  // Camera: lock X to cart (fixed screen position, no jitter); smooth Y for falling drama
  S.camX = S.cartX - CFG.CART_SCREEN_X;
  const lookY = S.airborne && S.cartVY > 0 ? Math.min(80, S.cartVY * 0.09) : 0;
  const targetCamY = S.cartY - CFG.CART_SCREEN_Y + lookY;
  const camSpeed = Math.abs(targetCamY - S.camY) > 300 ? dt * 18 : dt * 12;
  S.camY += (targetCamY - S.camY) * Math.min(1, camSpeed);

  // Track layer
  S.currentLayer = currentLayerIdx(S.cartY);

  // Per-circle mechanics tick (may call die() / win() and return state transitions)
  updateHazards(dt);
  if (S.state !== 'playing') return;

  stepParticles(dt, CFG.GRAVITY * 0.9);

  if (S.shake > 0) {
    S.shake *= Math.pow(0.001, dt);
    if (S.shake < 0.5) S.shake = 0;
  }
}

function die(cause) {
  if (S.state !== 'playing') return;
  S.state = 'dying';
  S.stateTime = 0;
  S.freezeFrame = CFG.DEATH_FREEZE;
  S.shake = 16;
  S.inputLock = 0.8;
  S.deathCause = cause || 'pit';
  spawnGhost(S.cartX, S.cartY - 30);
  sndDeath();
  spawnDeathParticles();
  S.finalTime = S.playTime;
  S.lastRunEscaped = false;
}

function win() {
  if (S.state !== 'playing') return;
  S.state = 'won';
  S.stateTime = 0;
  S.finalTime = S.playTime;
  S.deepestLayer = CFG.LAYER_COUNT - 1;
  S.lastRunEscaped = true;
  S.inputLock = 1.0;
  S.shake = 8;
  sndWin();
  spawnWinParticles();
  if (S.finalTime < S.bestTime) {
    S.bestTime = S.finalTime;
    try { localStorage.setItem('railgrind.best.time', String(S.finalTime)); } catch (e) {}
  }
}

// ============================================================
// STATE TRANSITIONS
// ============================================================
function startGame() {
  S.state = 'playing';
  S.stateTime = 0;
  S.playTime = 0;
  S.particles = [];
  S.ghost = null;
  S.shake = 0;
  S.inputLock = 0;
  S.portalCooldown = 0;

  // Spawn on the first rail of layer 0
  const firstRail = WORLD.rails.find(r => r.layerIdx === 0);
  S.cartX = firstRail.x1 + 80;
  S.cartY = railYAt(firstRail, S.cartX);
  S.currentRail = firstRail;
  S.airborne = false;
  S.cartVX = CFG.BASE_SPEED;
  S.cartVY = 0;
  S.cartRot = Math.atan(firstRail.slope);
  S.prevCartX = S.cartX;
  S.prevCartY = S.cartY;
  S.prevRot = S.cartRot;
  S.coyote = 0;
  S.jumpBuffer = 0;
  S.camX = S.cartX - CFG.CART_SCREEN_X;
  S.camY = S.cartY - CFG.CART_SCREEN_Y;
  S.currentLayer = 0;
  S.prevLayer = -1;
  S.deepestLayer = 0;
  S.lastRunEscaped = false;
  S.initials = '';
  S.scoreSubmitted = false;
  resetHazards();
}

function submitInitials() {
  if (S.scoreSubmitted) return;
  const ini = S.initials.trim().toUpperCase().slice(0, 3);
  if (!ini) { skipInitials(); return; }
  S.scoreSubmitted = true;
  saveScore(ini, S.finalTime, S.deepestLayer, S.lastRunEscaped);
  fetchScores();
  S.state = 'title';
  S.stateTime = 0;
  S.initials = '';
}

function skipInitials() {
  S.scoreSubmitted = true;
  S.state = 'title';
  S.stateTime = 0;
  S.initials = '';
}

function enterTitle() {
  S.state = 'title';
  S.stateTime = 0;
  S.particles = [];
  S.ghost = null;
  S.shake = 0;
  S.inputLock = 0;

  // Title camera: show layer 0 drifting forward
  const firstRail = WORLD.rails.find(r => r.layerIdx === 0);
  S.cartX = firstRail.x1 + 120;
  S.cartY = railYAt(firstRail, S.cartX);
  S.currentRail = firstRail;
  S.airborne = false;
  S.cartVX = CFG.BASE_SPEED * 0.6;
  S.cartVY = 0;
  S.cartRot = 0;
  S.camX = S.cartX - CFG.CART_SCREEN_X;
  S.camY = S.cartY - CFG.CART_SCREEN_Y;
  S.currentLayer = 0;
}

// ============================================================
// HUD / OVERLAYS
// ============================================================
function fmtTime(t) {
  if (!isFinite(t)) return '--:--.--';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const ms = Math.floor((t - Math.floor(t)) * 100);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + String(ms).padStart(2, '0');
}

function drawHUD() {
  ctx.save();

  if (sidebarMode) {
    // Sidebars carry the rich HUD — keep the game viewport clean. Only show
    // a small current-circle banner at the top so the player knows their depth.
    const layerName = LAYERS[S.currentLayer]?.name || '';
    ctx.font = '900 12px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(230,217,192,0.45)';
    ctx.fillText('CIRCLE ' + (S.currentLayer + 1), CFG.W * 0.5, 14);
    ctx.font = '900 22px Impact, system-ui, sans-serif';
    ctx.shadowColor = CFG.C_NEON_A;
    ctx.shadowBlur = 10;
    ctx.fillStyle = CFG.C_NEON_A;
    ctx.fillText(layerName, CFG.W * 0.5, 28);
    ctx.shadowBlur = 0;
    ctx.restore();
    drawHazardHUD();
    return;
  }

  // Narrow mode (mobile portrait): compact in-viewport HUD
  const timeStr = fmtTime(S.playTime);
  ctx.font = '900 22px Impact, "Arial Black", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.shadowColor = CFG.C_NEON_C;
  ctx.shadowBlur = 12;
  ctx.fillStyle = CFG.C_NEON_C;
  ctx.fillText(timeStr, 16, 16);
  ctx.shadowBlur = 3;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(timeStr, 16, 16);
  ctx.shadowBlur = 0;

  const layerName = LAYERS[S.currentLayer]?.name || '';
  ctx.font = '900 12px Impact, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(230,217,192,0.6)';
  ctx.fillText('CIRCLE ' + (S.currentLayer + 1) + ' / 9', 18, 46);
  ctx.font = '900 18px Impact, system-ui, sans-serif';
  ctx.shadowColor = CFG.C_NEON_A;
  ctx.shadowBlur = 8;
  ctx.fillStyle = CFG.C_NEON_A;
  ctx.fillText(layerName, 18, 60);
  ctx.shadowBlur = 0;

  // Best on the right
  ctx.font = '900 13px Impact, system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  const best = isFinite(S.bestTime) ? fmtTime(S.bestTime) : '--:--.--';
  ctx.fillStyle = 'rgba(255,176,64,0.8)';
  ctx.fillText('BEST ' + best, CFG.W - 16, 18);

  drawLayerProgressBar();
  ctx.restore();
  drawHazardHUD();
}

function drawHazardHUD() {
  if (!S.mech) return;

  // Entry banner — shown for ~2.4s each time S.currentLayer changes
  const bannerLife = 2.4;
  const bAge = S.playTime - S.bannerAt;
  if (S.bannerText && bAge >= 0 && bAge < bannerLife) {
    const t = bAge / bannerLife;
    // Fade in quickly, hold, fade out
    let alpha = 1;
    if (t < 0.12) alpha = t / 0.12;
    else if (t > 0.75) alpha = 1 - (t - 0.75) / 0.25;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    const cx = CFG.W * 0.5, cy = 88;
    // Backing strip
    ctx.fillStyle = 'rgba(8, 6, 14, 0.72)';
    ctx.fillRect(cx - 220, cy - 26, 440, 52);
    ctx.strokeStyle = 'rgba(201, 165, 85, 0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx - 220, cy - 26, 440, 52);
    drawNeonText(S.bannerText, cx, cy - 6, 22, CFG.C_NEON_A, 0);
    ctx.font = '900 14px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#E6D9C0';
    ctx.fillText(S.bannerSub, cx, cy + 14);
    ctx.restore();
  }

  // Coin counter (Greed)
  if (S.currentLayer === 5) {
    const hz = hazardOfLayer(5);
    if (hz && hz.type === 'greed') {
      let n = 0;
      for (const k of S.mech.coinsTaken) if (k.startsWith('5:')) n++;
      const locked = S.mech.portalLocked.has(5);
      const cx = CFG.W - 110, cy = 90;
      ctx.save();
      ctx.fillStyle = 'rgba(8, 6, 14, 0.7)';
      ctx.fillRect(cx - 4, cy - 20, 100, 52);
      ctx.strokeStyle = locked ? '#E05050' : 'rgba(244, 208, 63, 0.6)';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - 4, cy - 20, 100, 52);
      ctx.font = '900 10px Impact, system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = locked ? '#FF7070' : '#F4D03F';
      ctx.fillText(locked ? 'PORTAL SEALED' : 'GREED', cx, cy - 16);
      ctx.font = '900 28px Impact, system-ui, sans-serif';
      ctx.shadowColor = locked ? '#E05050' : '#F4D03F';
      ctx.shadowBlur = 10;
      ctx.fillStyle = locked ? '#FF5050' : '#F4D03F';
      ctx.fillText(n + ' / ' + hz.limit, cx, cy);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // Wind indicator (Lust)
  if (S.currentLayer === 7) {
    const w = S.mech.wind.current || 0;
    const cx = CFG.W * 0.5, cy = 52;
    ctx.save();
    ctx.font = '900 10px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(230, 217, 192, 0.75)';
    ctx.fillText('WIND', cx, cy - 14);
    // Bar from center
    const maxMag = 160;
    const mag = Math.max(-maxMag, Math.min(maxMag, w));
    const barLen = 90;
    const barX = cx - barLen;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(barX, cy - 4, barLen * 2, 8);
    ctx.fillStyle = w >= 0 ? '#B080FF' : '#6DFFEC';
    const dir = Math.sign(mag) || 1;
    const fillLen = Math.abs(mag / maxMag) * barLen;
    ctx.fillRect(cx, cy - 4, fillLen * dir, 8);
    // Tick at center
    ctx.strokeStyle = 'rgba(230,217,192,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 7);
    ctx.lineTo(cx, cy + 7);
    ctx.stroke();
    // Arrow
    if (Math.abs(mag) > 20) {
      const ax = cx + fillLen * dir + 10 * dir;
      ctx.fillStyle = w >= 0 ? '#B080FF' : '#6DFFEC';
      ctx.beginPath();
      ctx.moveTo(ax, cy);
      ctx.lineTo(ax - 8 * dir, cy - 5);
      ctx.lineTo(ax - 8 * dir, cy + 5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // Tide indicator (Wrath) — small bar showing how close the tide is to you
  if (S.currentLayer === 4 && S.mech.tide.active) {
    const topY = layerTopY(4);
    const tideRel = S.mech.tide.y - topY;   // 0..LAYER_H
    const t = Math.max(0, Math.min(1, tideRel / CFG.LAYER_H));
    const cx = CFG.W - 80, cy = 100;
    const h = 60, w = 14;
    ctx.save();
    ctx.fillStyle = 'rgba(10, 2, 4, 0.7)';
    ctx.fillRect(cx - 2, cy - 2, w + 4, h + 4);
    ctx.strokeStyle = '#E05050';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cx, cy, w, h);
    const fillH = h * (1 - t);
    ctx.fillStyle = '#A02028';
    ctx.fillRect(cx, cy + h - fillH, w, fillH);
    ctx.font = '900 10px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#FF7070';
    ctx.fillText('TIDE', cx + w * 0.5, cy + h + 6);
    ctx.restore();
  }
}

function drawLeftSidebar() {
  const x = 0, y = 0, w = CFG.SIDEBAR_W, h = CFG.H;
  // Panel
  const bg = ctx.createLinearGradient(x, 0, x + w, 0);
  bg.addColorStop(0, '#08060F');
  bg.addColorStop(1, '#100A18');
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(110,90,160,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w - 0.5, 0);
  ctx.lineTo(x + w - 0.5, h);
  ctx.stroke();

  // Title
  ctx.save();
  ctx.font = '900 12px Impact, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(230,217,192,0.55)';
  ctx.fillText('THE NINE', w * 0.5, 14);
  ctx.fillText('CIRCLES', w * 0.5, 28);
  ctx.restore();

  // List entries — top = layer 8 (summit), bottom = layer 0 (pit)
  const listTop = 58;
  const rowH = 38;
  const romans = ['IX','VIII','VII','VI','V','IV','III','II','I'];
  for (let i = 0; i < 9; i++) {
    const displayIdx = i;               // 0..8 in display order, 0 = top
    const layerIdx = 8 - i;             // layer 8 (LIMBO) at top, layer 0 at bottom
    const L = LAYERS[layerIdx];
    const ry = listTop + displayIdx * rowH;
    const isCurrent = (layerIdx === S.currentLayer && S.state === 'playing');
    const visited = (layerIdx >= S.currentLayer);  // same-or-higher layers we've passed

    if (isCurrent) {
      ctx.fillStyle = 'rgba(255,176,64,0.15)';
      ctx.fillRect(x + 4, ry - 4, w - 8, rowH - 4);
      ctx.strokeStyle = CFG.C_NEON_A;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x + 4, ry - 4, w - 8, rowH - 4);
    }

    const alpha = isCurrent ? 1 : (visited ? 0.55 : 0.3);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '900 11px Impact, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = isCurrent ? CFG.C_NEON_A : 'rgba(230,217,192,0.8)';
    ctx.fillText(romans[i], x + 10, ry);
    ctx.font = '900 14px Impact, system-ui, sans-serif';
    ctx.fillStyle = isCurrent ? '#FFFFFF' : 'rgba(230,217,192,0.8)';
    ctx.fillText(L.name, x + 32, ry);
    // Role label
    ctx.font = '700 9px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(230,217,192,0.5)';
    const role = layerIdx === 0 ? 'PIT FLOOR' : (layerIdx === 8 ? 'SUMMIT' : 'CLIMB');
    ctx.fillText(role, x + 32, ry + 18);
    ctx.restore();
  }
}

function drawRightSidebar() {
  const x = CANVAS_W - CFG.SIDEBAR_W, y = 0, w = CFG.SIDEBAR_W, h = CFG.H;
  const bg = ctx.createLinearGradient(x, 0, x + w, 0);
  bg.addColorStop(0, '#100A18');
  bg.addColorStop(1, '#08060F');
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(110,90,160,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 0.5, 0);
  ctx.lineTo(x + 0.5, h);
  ctx.stroke();

  // RUN TIME label + big clock
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '900 12px Impact, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(230,217,192,0.55)';
  ctx.fillText('RUN TIME', x + w * 0.5, 20);

  const timeStr = fmtTime(S.state === 'playing' || S.state === 'dying' ? S.playTime : S.finalTime || 0);
  ctx.font = '900 22px "Courier New", monospace';
  ctx.shadowColor = CFG.C_NEON_C;
  ctx.shadowBlur = 12;
  ctx.fillStyle = CFG.C_NEON_C;
  ctx.fillText(timeStr, x + w * 0.5, 38);
  ctx.shadowBlur = 0;

  // BEST
  ctx.font = '900 12px Impact, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(230,217,192,0.55)';
  ctx.fillText('BEST ESCAPE', x + w * 0.5, 82);
  const best = isFinite(S.bestTime) ? fmtTime(S.bestTime) : '--:--.--';
  ctx.font = '900 18px "Courier New", monospace';
  ctx.shadowColor = CFG.C_NEON_A;
  ctx.shadowBlur = 10;
  ctx.fillStyle = CFG.C_NEON_A;
  ctx.fillText(best, x + w * 0.5, 100);
  ctx.shadowBlur = 0;

  // Divider
  ctx.strokeStyle = 'rgba(110,90,160,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 14, 140);
  ctx.lineTo(x + w - 14, 140);
  ctx.stroke();

  // Vertical progress ("depth" bar)
  ctx.font = '900 11px Impact, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(230,217,192,0.55)';
  ctx.fillText('DEPTH', x + w * 0.5, 154);

  const barX = x + w * 0.5 - 8, barY = 176, barW = 16, barH = 240;
  ctx.fillStyle = 'rgba(10,10,18,0.7)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.strokeStyle = 'rgba(230,217,192,0.4)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(barX, barY, barW, barH);
  // Tick marks for each circle
  for (let i = 0; i < 9; i++) {
    const py = barY + barH - (i / 8) * barH;
    ctx.strokeStyle = 'rgba(230,217,192,0.25)';
    ctx.beginPath();
    ctx.moveTo(barX, py);
    ctx.lineTo(barX + barW, py);
    ctx.stroke();
  }
  // Cart marker
  const progressT = (S.cartY >= WORLD.bottomY) ? 0 : Math.max(0, Math.min(1, 1 - S.cartY / WORLD.bottomY));
  const py = barY + barH - progressT * barH;
  ctx.fillStyle = CFG.C_NEON_C;
  ctx.shadowColor = CFG.C_NEON_C;
  ctx.shadowBlur = 10;
  ctx.fillRect(barX - 4, py - 3, barW + 8, 6);
  ctx.shadowBlur = 0;

  // Controls reminder bottom
  ctx.font = '700 10px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(230,217,192,0.45)';
  ctx.fillText('SPACE / TAP', x + w * 0.5, h - 46);
  ctx.fillText('TO JUMP', x + w * 0.5, h - 32);
  ctx.fillText('M — MUTE', x + w * 0.5, h - 14);

  ctx.restore();
}

function drawLayerProgressBar() {
  const x = CFG.W - 30, y = 60, w = 14, h = 360;
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,18,0.6)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(230,217,192,0.35)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);
  // Mark each layer
  for (let i = 0; i < 9; i++) {
    const py = y + h - (i / 8) * h;
    ctx.strokeStyle = 'rgba(230,217,192,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, py);
    ctx.lineTo(x + w, py);
    ctx.stroke();
  }
  // Current layer indicator
  const progressT = (S.cartY >= WORLD.bottomY) ? 0 : (1 - S.cartY / WORLD.bottomY);
  const py = y + h - progressT * h;
  ctx.fillStyle = CFG.C_NEON_C;
  ctx.shadowColor = CFG.C_NEON_C;
  ctx.shadowBlur = 12;
  ctx.fillRect(x - 4, py - 3, w + 8, 6);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawTitleOverlay() {
  const bob = Math.sin(S.titleBob * 2) * 4;
  const cx = CFG.W * 0.5;

  drawNeonText('RAILGRIND', cx, 150 + bob, 84, CFG.C_NEON_A, -0.02);
  drawNeonText('NINE CIRCLES', cx, 210, 30, CFG.C_NEON_P, 0);

  const pulse = 0.6 + 0.4 * Math.sin(S.titleBob * 3);
  ctx.save();
  ctx.globalAlpha = pulse;
  drawNeonText('PRESS · TAP · TO DESCEND', cx, 282, 26, CFG.C_NEON_C, 0);
  ctx.restore();

  if (isFinite(S.bestTime)) {
    drawNeonText('BEST ESCAPE  ' + fmtTime(S.bestTime), cx, 334, 22, CFG.C_NEON_A, 0);
  }

  drawLeaderboardList(cx, 374, 5);

  if (editorOverrideActive) {
    ctx.save();
    ctx.font = '900 12px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#9B7BFF';
    ctx.shadowColor = '#9B7BFF';
    ctx.shadowBlur = 6;
    ctx.fillText('◆ EDITOR LEVEL ◆', cx, 250);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  ctx.save();
  ctx.font = '700 11px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(226,217,192,0.55)';
  ctx.fillText('SPACE / W / UP / TAP — JUMP       M — MUTE', cx, CFG.H - 46);
  ctx.fillStyle = 'rgba(226,217,192,0.45)';
  ctx.fillText('FALL THROUGH MINE-HOLES TO CLIMB · AVOID THE PIT', cx, CFG.H - 28);
  ctx.restore();
}

function drawGameOverOverlay() {
  ctx.fillStyle = 'rgba(5,5,10,0.65)';
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  const t = Math.min(1, S.stateTime / 0.5);
  const scl = 0.6 + t * 0.45;
  ctx.save();
  ctx.translate(CFG.W * 0.5, CFG.H * 0.3);
  ctx.scale(scl, scl);
  ctx.rotate(-0.03);
  drawNeonText('IMPALED', 0, 0, 84, CFG.C_NEON_P, 0);
  ctx.restore();

  drawNeonText('RUN TIME', CFG.W * 0.5, CFG.H * 0.48, 22, CFG.C_BONE, 0);
  drawNeonText(fmtTime(S.finalTime), CFG.W * 0.5, CFG.H * 0.56, 40, CFG.C_NEON_A, 0);

  if (isFinite(S.bestTime)) {
    ctx.save();
    ctx.font = '900 18px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = CFG.C_BONE;
    ctx.fillText('BEST  ' + fmtTime(S.bestTime), CFG.W * 0.5, CFG.H * 0.66);
    ctx.restore();
  }

  if (S.inputLock <= 0) {
    const pulse = 0.5 + 0.5 * Math.sin(S.stateTime * 4);
    ctx.save();
    ctx.globalAlpha = pulse;
    drawNeonText('PRESS · TAP · TO TRY AGAIN', CFG.W * 0.5, CFG.H - 56, 22, CFG.C_NEON_A, 0);
    ctx.restore();
  }
}

function drawWinOverlay() {
  const fade = Math.min(1, S.stateTime / 0.6);
  ctx.fillStyle = `rgba(6,8,16,${0.55 * fade})`;
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  const scl = 0.6 + Math.min(1, S.stateTime / 0.35) * 0.5;
  ctx.save();
  ctx.translate(CFG.W * 0.5, CFG.H * 0.28);
  ctx.scale(scl, scl);
  drawNeonText('ESCAPED', 0, 0, 96, CFG.C_NEON_C, -0.02);
  ctx.restore();

  drawNeonText('ESCAPE TIME', CFG.W * 0.5, CFG.H * 0.46, 22, CFG.C_BONE, 0);
  const isNewBest = S.finalTime <= S.bestTime + 0.001;
  drawNeonText(fmtTime(S.finalTime), CFG.W * 0.5, CFG.H * 0.55,
    48, isNewBest ? CFG.C_NEON_C : CFG.C_NEON_A, 0);

  if (isNewBest) {
    const flash = 0.6 + 0.4 * Math.sin(S.stateTime * 8);
    ctx.save();
    ctx.globalAlpha = flash;
    drawNeonText('NEW BEST', CFG.W * 0.5, CFG.H * 0.65, 30, CFG.C_NEON_A, 0);
    ctx.restore();
  } else {
    ctx.save();
    ctx.font = '900 18px Impact, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = CFG.C_BONE;
    ctx.fillText('BEST  ' + fmtTime(S.bestTime), CFG.W * 0.5, CFG.H * 0.66);
    ctx.restore();
  }

  if (S.inputLock <= 0) {
    const pulse = 0.5 + 0.5 * Math.sin(S.stateTime * 4);
    ctx.save();
    ctx.globalAlpha = pulse;
    drawNeonText('PRESS · TAP · FOR ANOTHER CLIMB', CFG.W * 0.5, CFG.H - 56, 22, CFG.C_NEON_A, 0);
    ctx.restore();
  }
}

function drawLeaderboardList(cx, topY, count) {
  const scores = getScores();
  if (!scores.length) return;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.font = '900 12px Impact, system-ui, sans-serif';
  const onlineTag = (LEADERBOARD_API && onlineScores) ? 'LEADERBOARD · ONLINE' : 'LEADERBOARD · LOCAL';
  ctx.fillStyle = 'rgba(230,217,192,0.6)';
  ctx.fillText(onlineTag, cx, topY);
  const rowH = 17;
  const shown = Math.min(count, scores.length);
  for (let i = 0; i < shown; i++) {
    const s = scores[i];
    const y = topY + 22 + i * rowH;
    ctx.font = '900 13px "Courier New", monospace';
    ctx.fillStyle = i === 0 ? CFG.C_NEON_A : 'rgba(230,217,192,0.75)';
    const rank = String(i + 1).padStart(2, ' ');
    const ini  = (s.ini || '???').padEnd(3, ' ').slice(0, 3);
    const t    = (s.time != null) ? fmtTime(s.time) : '--:--.--';
    const tag  = s.escaped ? 'ESC' : ('C' + String(((s.layer | 0) + 1)).padStart(1, ' '));
    ctx.fillText(`${rank}.  ${ini}  ${tag}  ${t}`, cx, y);
  }
  ctx.restore();
}

function drawInitialsOverlay() {
  ctx.fillStyle = 'rgba(5,5,10,0.78)';
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  const cx = CFG.W * 0.5;
  const escaped = !!S.lastRunEscaped;
  drawNeonText(escaped ? 'ESCAPED' : 'IMPALED', cx, 80, 56,
               escaped ? CFG.C_NEON_C : CFG.C_NEON_P, -0.02);

  ctx.save();
  ctx.font = '900 14px Impact, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(230,217,192,0.7)';
  ctx.fillText(escaped ? 'ESCAPE TIME' : 'RUN TIME', cx, 122);
  ctx.font = '900 28px "Courier New", monospace';
  ctx.fillStyle = CFG.C_NEON_A;
  ctx.shadowColor = CFG.C_NEON_A;
  ctx.shadowBlur = 10;
  ctx.fillText(fmtTime(S.finalTime), cx, 142);
  ctx.shadowBlur = 0;
  if (!escaped) {
    ctx.font = '900 12px Impact, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(230,217,192,0.65)';
    ctx.shadowBlur = 0;
    const reached = (S.deepestLayer | 0) + 1;
    const layerName = (typeof LAYERS !== 'undefined' && LAYERS[S.deepestLayer]?.name) || '';
    const sub = layerName ? `REACHED CIRCLE ${reached} · ${layerName.toUpperCase()}` : `REACHED CIRCLE ${reached}`;
    ctx.fillText(sub, cx, 166);
  }
  ctx.restore();

  // Initials slots
  ctx.save();
  ctx.font = '900 14px Impact, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(230,217,192,0.7)';
  ctx.fillText('ENTER YOUR INITIALS', cx, 192);

  const letters = (S.initials || '').padEnd(3, '_');
  const spacing = 44;
  const startX = cx - spacing;
  const baseY = 232;
  for (let i = 0; i < 3; i++) {
    const ch = letters[i];
    const filled = ch !== '_';
    const isCursor = i === S.initials.length && !filled;
    const blink = isCursor ? (0.45 + 0.55 * Math.abs(Math.sin(S.stateTime * 6))) : 1;
    // Slot box
    ctx.fillStyle = 'rgba(20,16,32,0.6)';
    ctx.fillRect(startX + i * spacing - 18, baseY - 22, 36, 44);
    ctx.strokeStyle = filled ? CFG.C_NEON_A : 'rgba(230,217,192,0.4)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(startX + i * spacing - 18, baseY - 22, 36, 44);
    ctx.font = '900 32px Impact, system-ui, sans-serif';
    ctx.fillStyle = filled
      ? `rgba(255, 176, 64, ${blink})`
      : `rgba(230,217,192, ${0.35 * blink})`;
    ctx.fillText(filled ? ch : '·', startX + i * spacing, baseY + 12);
  }
  ctx.restore();

  // Hint line
  ctx.save();
  ctx.font = '700 11px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(230,217,192,0.55)';
  ctx.fillText('TYPE 1-3 LETTERS · ENTER TO SUBMIT · ESC TO SKIP', cx, 296);
  ctx.fillStyle = 'rgba(230,217,192,0.4)';
  ctx.fillText('(TAP TO ' + (S.initials.length ? 'SUBMIT' : 'SKIP') + ')', cx, 312);
  ctx.restore();

  // Mini leaderboard preview
  drawLeaderboardList(cx, 344, 5);
}

function drawVignette() {
  const grad = ctx.createRadialGradient(CFG.W * 0.5, CFG.H * 0.55, 140, CFG.W * 0.5, CFG.H * 0.5, CFG.W * 0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.7, 'rgba(0,0,0,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0.65)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CFG.W, CFG.H);
}

function drawMutedIndicator() {
  if (!S.muted) return;
  ctx.save();
  ctx.fillStyle = 'rgba(226,217,192,0.4)';
  ctx.font = '700 12px system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('MUTED · M', CANVAS_W - 12, CFG.H - 8);
  ctx.restore();
}

// ============================================================
// LOOP
// ============================================================
let acc = 0;
let lastT = performance.now();

function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.1) dt = 0.1;

  S.titleBob += dt * 3;

  if (S.state === 'title') {
    S.stateTime += dt;
    // Drift cart forward on layer 0 for ambient title animation
    if (S.currentRail) {
      S.cartX += S.cartVX * dt;
      if (S.cartX > S.currentRail.x2 - 40) {
        // Snap back to start for endless drift
        S.cartX = S.currentRail.x1 + 120;
      }
      S.cartY = railYAt(S.currentRail, S.cartX);
      S.cartRot = Math.atan(S.currentRail.slope);
    }
    S.camX += ((S.cartX - CFG.CART_SCREEN_X) - S.camX) * Math.min(1, dt * 6);
    S.camY += ((S.cartY - CFG.CART_SCREEN_Y) - S.camY) * Math.min(1, dt * 6);
    if (jumpPressed) {
      jumpPressed = false;
      startGame();
    }
  } else if (S.state === 'playing') {
    acc += dt;
    let steps = 0;
    while (acc >= CFG.STEP && steps < 6) {
      physicsStep(CFG.STEP);
      acc -= CFG.STEP;
      steps++;
      if (S.state !== 'playing') break;
    }
  } else if (S.state === 'dying') {
    S.stateTime += dt;
    S.freezeFrame = Math.max(0, S.freezeFrame - dt);
    S.inputLock = Math.max(0, S.inputLock - dt);
    if (S.freezeFrame <= 0) {
      updateGhost(dt);
      stepParticles(dt, CFG.GRAVITY * 0.9);
    }
    if (S.shake > 0) {
      S.shake *= Math.pow(0.001, dt);
      if (S.shake < 0.5) S.shake = 0;
    }
    jumpPressed = false;
    if (S.stateTime > CFG.GHOST_LIFE + 0.2) {
      S.state = 'over';
      S.stateTime = 0;
      S.inputLock = 0.5;
    }
  } else if (S.state === 'over') {
    S.stateTime += dt;
    S.inputLock = Math.max(0, S.inputLock - dt);
    stepParticles(dt, CFG.GRAVITY * 0.9);
    updateGhost(dt);
    if (S.inputLock <= 0 && jumpPressed) {
      jumpPressed = false;
      S.state = 'initials';
      S.stateTime = 0;
      S.inputLock = 0.25;
      S.initials = '';
      return requestAnimationFrame(frame);
    }
    jumpPressed = false;
  } else if (S.state === 'initials') {
    S.stateTime += dt;
    S.inputLock = Math.max(0, S.inputLock - dt);
    stepParticles(dt, CFG.GRAVITY * 0.9);
    // Tap (no physical keyboard) skips the prompt — desktop typists press Enter instead.
    if (S.inputLock <= 0 && jumpPressed) {
      jumpPressed = false;
      if (S.initials.length > 0) submitInitials();
      else skipInitials();
    }
    jumpPressed = false;
  } else if (S.state === 'won') {
    S.stateTime += dt;
    S.inputLock = Math.max(0, S.inputLock - dt);
    stepParticles(dt, CFG.GRAVITY * 0.9);
    // Shake decays fast and hard-stops after 1s so the victory readout stays legible
    if (S.shake > 0) {
      if (S.stateTime >= 1) {
        S.shake = 0;
      } else {
        S.shake *= Math.pow(0.0005, dt);
        if (S.shake < 0.5) S.shake = 0;
      }
    }
    // Keep cart slowly rolling
    if (S.currentRail && S.cartX < WORLD.worldW - 60) {
      S.cartX += Math.max(60, S.cartVX * 0.6) * dt;
      const r = S.currentRail;
      if (S.cartX <= r.x2) S.cartY = railYAt(r, S.cartX);
    }
    S.camX += ((S.cartX - CFG.CART_SCREEN_X) - S.camX) * Math.min(1, dt * 4);
    S.camY += ((S.cartY - CFG.CART_SCREEN_Y) - S.camY) * Math.min(1, dt * 4);
    // Continual fireworks
    if (Math.random() < dt * 3) {
      spawnWinParticles();
    }
    if (S.inputLock <= 0 && jumpPressed) {
      jumpPressed = false;
      S.state = 'initials';
      S.stateTime = 0;
      S.inputLock = 0.25; // brief debounce so the same press doesn't auto-skip
      S.initials = '';
      return requestAnimationFrame(frame);
    }
    jumpPressed = false;
  }

  let renderCartX = S.cartX, renderCartY = S.cartY, renderRot = S.cartRot;
  if (S.state === 'playing') {
    const alpha = Math.min(1, acc / CFG.STEP);
    renderCartX = S.prevCartX + (S.cartX - S.prevCartX) * alpha;
    renderCartY = S.prevCartY + (S.cartY - S.prevCartY) * alpha;
    renderRot = S.prevRot + (S.cartRot - S.prevRot) * alpha;
  }

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = CFG.C_BG_DEEP;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const k = dpr * viewScale;
  const sx = S.shake > 0 ? (Math.random() - 0.5) * S.shake : 0;
  const sy = S.shake > 0 ? (Math.random() - 0.5) * S.shake : 0;
  ctx.setTransform(k, 0, 0, k, dpr * offsetX + sx * k, dpr * offsetY + sy * k);

  // Full canvas background (behind sidebars + game)
  ctx.fillStyle = '#05040C';
  ctx.fillRect(0, 0, CANVAS_W, CFG.H);

  // Sidebars (drawn in canvas coords, outside the game clip)
  if (sidebarMode) {
    drawLeftSidebar();
    drawRightSidebar();
  }

  // Enter game viewport: clip + translate
  ctx.save();
  ctx.beginPath();
  ctx.rect(GAME_X, 0, CFG.W, CFG.H);
  ctx.clip();
  ctx.translate(GAME_X, 0);

  drawBackground();
  drawWalls();
  drawSpikePit();
  drawRails();
  drawHazards();
  drawPortals();
  drawFinish();

  if (S.state === 'title') {
    drawCart(renderCartX - S.camX, renderCartY - S.camY, renderRot, false);
    drawVignette();
    drawTitleOverlay();
  } else if (S.state === 'playing') {
    // Cart anchored to a fixed screen X — world scrolls past it — no horizontal shimmer
    drawCart(CFG.CART_SCREEN_X, renderCartY - S.camY, renderRot, S.airborne);
    drawParticles();
    drawVignette();
    drawHUD();
  } else if (S.state === 'dying') {
    // Draw cart frozen briefly, then ghost animation
    if (S.freezeFrame > 0 || S.stateTime < 0.5) {
      drawCart(renderCartX - S.camX, renderCartY - S.camY, renderRot, true);
    }
    drawGhost();
    drawParticles();
    drawVignette();
    drawHUD();
  } else if (S.state === 'over') {
    drawGhost();
    drawParticles();
    drawVignette();
    drawHUD();
    drawGameOverOverlay();
  } else if (S.state === 'won') {
    drawCart(renderCartX - S.camX, renderCartY - S.camY, renderRot, false);
    drawParticles();
    drawVignette();
    drawHUD();
    drawWinOverlay();
  } else if (S.state === 'initials') {
    drawCart(renderCartX - S.camX, renderCartY - S.camY, renderRot, false);
    drawParticles();
    drawVignette();
    drawHUD();
    drawInitialsOverlay();
  }

  drawMutedIndicator();
  ctx.restore();

  requestAnimationFrame(frame);
}

// ============================================================
// BOOT
// ============================================================
enterTitle();
requestAnimationFrame(frame);

window.addEventListener('error', () => {});

})();
</script>
